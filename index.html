   sharhAr:`(١) إن قلت: الجزء قد يكون أعظم من الكل كما ورد في الخبر أن ضرس الجهنمي يكون مثل أحد يوم القيامة، وكذا ذنب الطاووس أعظم منه، قلنا: لم تتصور معنى الكل والجزء؛ لأن الكل عبارة عن مجموع الأجزاء ولا شك أن مجموع أجزاء الجهنمي يكون أعظم من ضرسه ومجموع أجزاء الطاووس أعظم من ذنبه. (المرضاة حاشية المرقاة/30)

(٢) فإنه محتاج إلى النظر بأن يقال: العالم متغير وكل متغير حادث، ينتج العالم حادث، وكذا إذا قلنا: الصانع مؤثر في المجموع وكل ما هو كذلك موجود ينتج الصانع موجود. (المرضاة حاشية المرقاة/30)

(٣) الترتيب في اللغة جعل كل شيء في مرتبته، وفي الاصطلاح جعل الأشياء المتعددة بحيث يطلق عليها اسم الواحد وتكون نسبة بعضها إلى بعض بالتقدم والتأخر، المراد بالأمور ما فوق الواحد، فإن الجموع الواقعة في تعاريف الفن يراد بها ذلك، وإنما قلنا ذلك ليشمل التعريف ما إذا كان الترتيب بين أمرين كالحيوان الناطق. (المرضاة/30)

(٤) اعلم أن مقصود المصنف العلامة قدس سره بيان الاحتياج إلى المنطق وكان بيان الاحتياج موقوفًا على ثلاثة أمور: تقسيم العلم إلى التصور والتصديق، وانقسام كل منهما إلى البديهي والنظري ووقوع الخطأ في الفكر عند قصد تحصيل النظري من البديهي فلما فرغ من الأولين شرع في بيان الثالث وقال: إياك وأن تنظر...إلخ. (المرضاة/31)`,
   sharhEn:`(1) If you say: a part may be greater than the whole, as in the report that the molar of the people of Hell will be like Mount Uḥud on the Day of Resurrection, and the peacock's tail is greater than it — we say: you have not understood the meaning of "whole" and "part" because the whole is the sum of the parts, and undoubtedly the sum of the parts of the Hell-dweller is greater than his molar, and the sum of the parts of the peacock is greater than its tail.

(2) For it requires thought: "The world is changing, and everything that changes is originated" — therefore the world is originated. Similarly, if we say: "The Maker is an agent in the whole, and everything that is so is existent" — therefore the Maker exists.

(3) Arrangement in language is placing each thing in its proper order; in terminology, it is placing multiple things so that they are called by one name and their relation to each other is one of precedence and subsequence. By "matters" is meant more than one, for the plurals used in the definitions of the art are intended for that. We said this so that the definition includes arrangement between two matters, like "the rational animal."

(4) Know that the author's purpose is to explain the need for logic. The explanation of the need depends on three things: dividing knowledge into conception and assent, dividing each into intuitive and theoretical, and the occurrence of error in thought when trying to obtain the theoretical from the intuitive. Having finished the first two, he began the third and said: "Beware of thinking..."`},
  {page:5, topic:'الحاجة إلى المنطق — تسميته',
   matnAr:`يقول: العالم (١) حادث ويستدل بقوله: العالم متغير وكل متغير حادث فالعالم حادث، ومن زاعم يزعم أن العالم قديم غير مسبوق بالعدم ويبرهن عليه بقوله العالم مستغن عن المؤثر وكل ما هذا شأنه فهو قديم ولا أظلك شاكًا في أن أحد الفكرين صحيح حق والآخر فاسد غلط.

وإذا كان قد وقع (٢) الغلط في فكر العقلاء فعلم من ذلك أن الفطرة الإنسانية غير كافية في تمييز الخطأ من الصواب وامتياز القشر عن اللباب فجاءت الحاجة في ذلك إلى قانون عاصم عن الخطأ في الفكر، يبين فيه طرق اكتساب المجهولات عن المعلومات وهذا القانون هو المنطق والميزان.

أما تسميته بالمنطق (٣) فلتأثيره في النطق الظاهري أعني التكلم إذ العارف به يقوى على التكلم بما لا يقوى عليه الجاهل، وكذا في النطق الباطني أعني الإدراك لأن المنطقي يعرف حقائق الأشياء ويعلم أجناسها وفصولها وأنواعها ولوازمها وخواصها بخلاف الغافل عن هذا العلم الشريف وأما تسميته بالميزان فلأنه قسطاس للعقل توزن به الأفكار`,
   matnEn:`...says: "The world is originated" and argues: "The world is changing, and everything that changes is originated — therefore the world is originated." Another claimant asserts that the world is eternal, without prior non-existence, and argues: "The world is independent of any agent, and whatever is so is eternal." I do not doubt that one of these two thoughts is correct and true, and the other is corrupt and false.

Since error has occurred in the thought of rational people, it is known that human nature is insufficient for distinguishing error from correctness, and separating the husk from the kernel. Thus the need arose for a law that protects against error in thought, which shows the ways of acquiring the unknown from the known. This law is logic (manṭiq) and the scale (mīzān).

It is called "manṭiq" because of its effect on external speech (utterance) — for the one who knows it is able to speak in ways the ignorant cannot — and also on internal speech (intellection), for the logician knows the realities of things, their genera, differentiae, species, concomitants, and properties, unlike the one heedless of this noble science. It is called "mīzān" (scale) because it is a balance for the intellect by which thoughts are weighed.`,
   sharhAr:`(١) العالم "يطلق على جميع ما سوى الله تعالى من الموجودات، و"الحادث" هو الموجود بعد العدم و"القديم" هو الموجود الذي لا ابتداء لوجوده، فمعنى قولنا: "العالم حادث" أن كل موجود سوى الله تعالى موجود بعد العدم؛ إذ هو خالق كل شيء بإرادته واختياره، هذا هو الحق الذي يجب اعتقاده. (المرضاة حاشية المرقاة/32)

(٢) دفع لما يمكن وروده من أن وقوع الخطأ في النظر لا يوجب الاحتياج إلى قانون يسمى منطقًا لم لا يجوز أن تعصم الفطرة الإنسانية عن الخطأ في الفكر؟ حاصل الدفع: أنا إذا شاهدنا أن كثيرًا من العقلاء وقعوا في خطأ لعارض عرضهم علمنا أن الفطرة الإنسانية غير عاصمة عن الخطأ في الفكر، أما الفطرة الخالية عن العوارض والموادع فهي وإن كانت كافية في العصمة لكن لا حاجة لصاحبها إلى المنطق فلا ضير، فافهم. (المرضاة حاشية المرقاة/32)

(٣) المنطق إما مصدر ميمي بمعنى النطق، أطلق على هذا الفن مبالغة فإن للمنطق مدخلة عظيمة في تكميل النطق، وإما اسم مكان فإن هذا العلم محل النطق ومظهره. (حاشية المرقاة/4)`,
   sharhEn:`(1) "The world" refers to all existents other than God. "Originated" is the existent after non-existence. "Eternal" is the existent whose existence has no beginning. So our statement "the world is originated" means that every existent other than God exists after non-existence, for He is the Creator of everything by His will and choice. This is the truth that must be believed.

(2) This is a refutation of what might be said: that the occurrence of error in thought does not necessitate a need for a law called logic — why can't human nature be protected from error in thought? The gist of the response: when we see that many rational people have fallen into error due to some obstruction, we know that human nature is not protected from error in thought. As for nature free from obstructions and impurities, even if it is sufficient for protection, its possessor has no need for logic, so no harm.

(3) "Manṭiq" is either a mīmī infinitive meaning "speech" — applied to this art as a hyperbole, since logic has a great role in perfecting speech — or a place-name, since this science is the locus and manifestation of speech.`},
  {page:6, topic:'المنطق علم آلي — موضوعه',
   matnAr:`الصحيحة ويعرف به نقصان ما في الأفكار الفاسدة واختلال ما في الأنظار الكاسدة ومن ثم يقال له: العلم الآلي (١) لكونه آلة لجميع العلوم (٢) لا سيما للعلوم الحكمية (٣).

فائدة: اعلم أن أرسطاطاليس الحكيم دون هذا العلم بأمر الإسكندر الرومي؛ ولهذا يلقب بالمعلم الأول، والفارابي هذب هذا الفن وهو المعلم الثاني وبعد إضاعة كتب الفارابي فصله الشيخ أبو علي بن سينا.

فصل: ولعلت علمت مما تلونا عليك في بيان الحاجة حد المنطق وتفريغه من أنه علم بقوانين تعصم مراعاتها الذهن عن الخطأ في الفكر (٤).

فصل: موضوع كل علم ما يبحث فيه عن عوارضه الذاتية، كبدن الإنسان للطب، والكلمة والكلام (٥) لعلم النحو، فموضوع المنطق المعلومات التصورية والتصديقية لكن لا مطلقًا بل من حيث إنها موصلة إلى المجهول التصوري أو التصديقي.`,
   matnEn:`...correct, and by it the deficiency in corrupt thoughts and the imbalance in misguided views are known. Hence it is called "the instrumental science" because it is a tool for all sciences, especially the philosophical sciences.

Benefit: Know that the wise Aristotle compiled this science by order of Alexander the Roman, so he is called the "First Teacher." Al-Fārābī refined this art and is the "Second Teacher." After the loss of al-Fārābī's books, Shaykh Abū ʿAlī ibn Sīnā systematized it.

Chapter: You have perhaps learned from what we have recited to you in explaining the need, the definition of logic and its clarification — that it is a science of laws whose observance protects the mind from error in thought.

Chapter: The subject-matter of every science is that whose essential accidents are investigated in it — like the human body for medicine, and the word and speech for grammar. The subject-matter of logic is conceptual and assenting cognitions, but not absolutely — rather, insofar as they lead to conceptual or assenting unknown.`,
   sharhAr:`(١) اعلم أن بعض الناس قد ظنوا أن المنطق؛ إذ هو آلة العلوم وخدماتها لا يكون علمًا من جملتها، وهذا ليس بشيء؛ لأن المنطق علم في نفسه وآلة بالقياس إلى سائر العلوم وإطلاق العلم الآلي عليه جامع للاعتبارين. (شرح المرقاة/26)

(٢) فلا يرد: أنه لو كان المنطق آلة لجميع العلوم لكان كل علم محتاجًا إلى المنطق فيلزم كون المنطق محتاجًا إلى نفسه أو إلى منطق آخر فيلزم الدور أو التسلسل، وذلك (أي عدم الورود) لتخصيص بعض العلوم بالاحتياج إلى المنطق.

(٣) اعلم أنه لو كان المنطق خارجًا عن أقسام الحكمة النظرية فكونه آلة للعلوم الحكمية ظاهر، ولو كان داخلًا تحت الحكمة الإلهية – كما يفهم من كلام أكثر الرؤساء – فيقال: لما كان البحث فيه من جهة الإيصال وكان غير مقصود بالذات فرّز عن الحكمة وجعل وسيلة إليها. (شرح المرقاة/26)

(٤) يخرج بهذا القيد العلوم القانونية التي تعصم مراعاتها عن الخطأ في اللفظ والعبارة كالصرف والنحو والمعاني.

(٥) الصواب أن موضوعه اللفظ الموضوع باعتبار صدقه على كل واحد من الأقسام الثلاثة أي الكلمة والمركب الغير التام والكلام. (المرضاة حاشية المرقاة/35)`,
   sharhEn:`(1) Know that some people thought that logic, since it is a tool and servant of the sciences, is not itself a science. This is nothing — for logic is a science in itself and a tool relative to other sciences, and calling it an instrumental science combines both considerations.

(2) The objection does not hold: that if logic were a tool for all sciences, then every science would need logic, requiring logic to need itself or another logic, leading to circularity or infinite regress — because some sciences are specified as needing logic.

(3) Know that if logic is outside the divisions of theoretical wisdom, its being a tool for the philosophical sciences is obvious. If it is included under divine wisdom (as understood from most leaders), then since the investigation in it is from the aspect of conveying and it is not intended for itself, it was separated from wisdom and made a means to it.

(4) This qualification excludes the legal sciences whose observance protects against error in utterance and expression, like morphology, grammar, and semantics.

(5) The correct view is that its subject is the word, insofar as it applies to each of the three divisions — namely, the word, the incomplete compound, and speech.`},
  {page:7, topic:'غاية المنطق — الدلالة',
   matnAr:`فائدة: اعلم أن لكل علم وصناعة غاية وإلا لكان طلبه عبثًا والجدّ فيه لغوًا وغاية علم الميزان الإصابة في الفكر وحفظ الرأي عن الخطأ في النظر.

فصل: لا شغل (١) للمنطقي من حيث إنه منطقي ببحث الألفاظ، كيف وهذا البحث بمعزل عن غرضه وغايته ومع ذلك فلا بد له من بحث الألفاظ الدالة على المعاني؛ لأن الإفادة والاستفادة موقوفة على اللفظ من حيث الدالة على المعنى. (٢)

الإفادة والاستفادة موقوفة عليه ولذلك يقدم بحث الدلالة والألفاظ في كتب المنطق.

فصل في الدلالة: الدلالة لغة هو الإرشاد أي "راه نمودن" وفي الاصطلاح كون الشيء بحيث يلزم من العلم به العلم بشيء آخر (٣)، والدلالة قسمان: "لفظية، و"غير لفظية"، واللفظية ما يكون الدال فيه اللفظ، وغير اللفظية ما لا يكون الدال فيه اللفظ.

وكل منهما على ثلاثة أنحاء، أحدها: "اللفظية الوضعية" كدلالة لفظ زيد على مسماه والثانية: "اللفظية الطبعية" كدلالة لفظ أحج -بضم الهمزة وسكون الحاء المهملة، وقيل: بفتحها- على وجع الصدر؛ فإن الطبيعة تضطر بإحداث هذا اللفظ عند عروض الوجع في الصدر، والثالثة: "اللفظية العقلية" كدلالة لفظ ديز المسموع (٤) من وراء الجدار`,
   matnEn:`Benefit: Know that every science and art has a purpose, otherwise seeking it would be futile and striving in it idle talk. The purpose of the science of the Scale (Mīzān) is correctness in thought and preserving opinion from error in reflection.

Chapter: The logician, insofar as he is a logician, has no concern with investigating words — for this investigation is remote from his purpose and goal. Nevertheless, he must investigate words that signify meanings, because imparting and receiving knowledge depend on the word insofar as it indicates meaning.

Imparting and receiving knowledge depend on it, so the discussion of signification and words is placed at the beginning of logic books.

Chapter on Signification: Signification linguistically is guidance (in Persian: rāh namūdan). Technically, it is the state of a thing such that knowing it necessitates knowing another thing. Signification is of two types: verbal and non-verbal. Verbal is where the signifier is the word; non-verbal is where the signifier is not a word.

Each of these is of three kinds: first, "conventional verbal" — like the word "Zayd" indicating its referent; second, "natural verbal" — like the word "aḥj" (with damma on the hamza and sukūn on the ḥā', or with fatḥa) indicating chest pain, for nature compels one to utter this word when chest pain occurs; third, "rational verbal" — like the word "dīz" heard from behind the wall indicating the existence of the word.`,
   sharhAr:`(١) بضم الشين وسكون الغين المعجمة أو ضمها، أو فتح الشين وسكون الغين أو فتحها، ففيه أربع لغات. (شرح/32)

(٢) أي لكون الإفادة والاستفادة موقوفة على اللفظ من حيث الدالة على المعنى.

(٣) الشيء الأول دال والثاني مدلول، اعلم أن الدال في الاصطلاح هو اللفظ والمدلول هو المعنى وإلا فباعتبار اللغة الدال والمدلول هو المتكلم والمخاطب واللفظ واسطة في الدلالة والمعنى مدلول عليه. (المرضاة حاشية المرقاة/36)

(٤) إنما قيد اللفظ بكونه مسموعًا من وراء الجدار لما أفاد السيد المحقق قدس سره أن اللفظ إذا كان مشاهدًا كان وجوده معلومًا بحس البصر لا بدلالة اللفظ، وإنما مثل بلفظ ديز إشارة إلى أن خصوصية اللفظ لغو في الدلالة العقلية بخلاف خصوصيتها في الدلالة الوضعية والطبعية. (شرح المرقاة/33) أقول: وأيضًا لفظ زيد المسموع من وراء الجدار يدل دلالة عقلية على وجود اللفظ لكنه دال على المعنى الموضوع له أيضاً فاختار المصنف قدس سره لفظ ديز ليمتاز العقلية امتيازًا تامًا عن الوضعية لعدم وجود الوضعية فيه. (المرضاة حاشية المرقاة/37)`,
   sharhEn:`(1) With ḍamma on the shīn and sukūn on the ghayn, or ḍamma on both, or fatḥa on the shīn and sukūn on the ghayn, or fatḥa on both — four pronunciations.

(2) i.e. because giving and receiving knowledge depend on the word insofar as it indicates meaning.

(3) The first thing is the signifier (dāl) and the second is the signified (madlūl). Know that in terminology the signifier is the word and the signified is the meaning. Otherwise, linguistically, the signifier and signified are the speaker and the addressee, and the word is an intermediary in signification, and the meaning is signified.

(4) He restricted the word to being heard from behind the wall because the master investigator stated that if the word is seen, its existence is known by the sense of sight, not by signification. He gave the example of "dīz" to indicate that the particularity of the word is irrelevant in rational signification, unlike its particularity in conventional and natural signification. I say: also, the word "Zayd" heard from behind the wall indicates the existence of the word rationally, but it also indicates its designated meaning, so the author chose "dīz" to distinguish rational signification completely from conventional, since there is no conventional signification in it.`},
  {page:8, topic:'الأنواع الستة للدلالة',
   matnAr:`على وجود اللفظ، ورابعها: "غير اللفظية الوضعية" كدلالة الدوال الأربع (١) على مدلولاتها وخامسها: "غير اللفظية الطبعية" (٢) كدلالة صهيل الفرس على طلب الماء والكلأ، وسادسها: "غير اللفظية العقلية" كدلالة الدخان على النار فهذه ست دلالات.

والمنطقي (٣) إنما يبحث عن الدلالة اللفظية الوضعية لأن الإفادة للغير والاستفادة من الغير (٤) إنما يتيسر بها سهولة بخلاف غيرها فإن الإفادة والاستفادة بها لا يخلو عن صعوبة هذا.`,
   matnEn:`...indicating the existence of the word. Fourth, "conventional non-verbal" — like the indication of the four signs (lines, knots, markers, and gestures) on their referents. Fifth, "natural non-verbal" — like a horse's neigh indicating its desire for water and grass. Sixth, "rational non-verbal" — like smoke indicating fire. These are the six types of signification.

The logician only investigates conventional verbal signification, because imparting to others and receiving from others is facilitated only by it, unlike others, for imparting and receiving through them is not without difficulty.`,
   sharhAr:`(١) هي الخطوط والعقود والنصب والإشارات كذا أفاد المولى الجامعي قدس سره السامي، فالخطوط وهي النقوش الدالة على المعاني بتوسط الألفاظ الموضوعية لها، والعقود مفاصل الأصابع على الأعداد بحسب اصطلاح التجار، والنصب ما ينصب على الطريق لتعيين المسافة وغير ذلك، والإشارات دالة على المشار إليه، وجميع هذه الدوال من غير اللفظ فدلالاتها وضعية غير لفظية. (المرضاة حاشية المرقاة/37)

(٢) اعلم أن السيد السند قد أنكر غير اللفظية الطبعية قائلاً بأن أمثلتها داخلية في العقلية فإن العلاقة فيها أيضاً عقلية، والفاضل اللاهوري مولانا عبد الحكيم السيالكتي بين الفرق بينهما بأن المدلول في العقلية هو المؤثر وفي الطبيعة الحالة العارضة للمؤثر، يعني أن دلالة الأثر على ذات المؤثر عقلية وعلى صفته طبيعية فافهم. (المرضاة/38)

(٣) قد علم مما سبق الأقسام الستة للدلالة ولم يعلم أن المطلوب من أي قسم يبحث فشرع المصنف في بيانه. (المرضاة حاشية المرقاة/38)

(٤) تحقيقه أن طبع الإنسان يقتضي الاجتماع مع بني نوعه ليشاركوا ويتعاونوا في تحصيل الغذاء واللباس والمسكن وغيرها حتى لو انفرد عنهم تعذر معيشته وحصول الأشياء المذكورة لما كان بمقدوره فيتوقف لا محالة على أن يعلم كل واحد غيره ما في ضميره، والدلالة الطبعية وكذا العقلية غير كافية للفهم المفصل وأما الإشارات فأيضًا غير كافية للدلالة وفي الكتابة مشقة عظيمة فاحتيج في التعليم والتعلم إلى الألفاظ الموضوعية بإزاء ما في ضميرهم، فعلم أن الاحتياج إنما هو إلى الدلالة اللفظية الوضعية لها الاعتبار في العلوم والمحاورات دون غيرها، وهذا ظاهر أن الألفاظ موضوعة للمعاني من حيث هي إذ المقصود من الوضع ليس إلا إفادة ما في الضمير ولا يتعلق القصد بإفادة الشيء من حيث تقييده بأحد الوجودين. وتمام التفصيل في شرح شمس العلماء. (المرضاة حاشية المرقاة/38)`,
   sharhEn:`(1) They are lines, knots, markers, and gestures — as the respected al-Jāmiʿī stated. Lines are engravings that indicate meanings through the words conventionally assigned to them. Knots are the joints of the fingers for numbers according to the merchants' convention. Markers are set up on the road to determine distance and the like. Gestures indicate what is pointed to. All these signifiers are non-verbal, so their signification is conventional non-verbal.

(2) Know that al-Sayyid al-Sanad denied natural non-verbal signification, saying its examples fall under rational signification, since the relation there is also rational. The learned al-Lāhūrī, ʿAbd al-Ḥakīm al-Siyālkūtī, explained the difference: in rational signification, the signified is the agent (muʾaththir); in natural signification, it is the state that befalls the agent. That is, the indication of the effect on the essence of the agent is rational, and on its attribute is natural — so understand.

(3) The six types of signification have been mentioned, but it is not known which division is sought, so the author began to explain it.

(4) Its verification: human nature requires social interaction with one's kind to cooperate in obtaining food, clothing, shelter, etc. If one were isolated, life would be difficult and obtaining these things would be beyond one's capacity. So it is necessary for each to make known to others what is in his mind. Natural and rational signification are insufficient for detailed understanding. Gestures are also insufficient. Writing involves great difficulty. So there was a need, in teaching and learning, for conventional words corresponding to what is in their minds. Thus the need is for conventional verbal signification, which is the one considered in the sciences and discourses, unlike others. It is clear that words are assigned to meanings as such, for the purpose of assignment is only to convey what is in the mind, and the intention is not to convey the thing with one of the two existences. The full detail is in the commentary of Shams al-ʿUlamā.`},
  {page:9, topic:'أقسام الدلالة اللفظية الوضعية',
   matnAr:`فصل: وينبغي أن يعلم أن الدلالة اللفظية الوضعية التي لها العبرة في المحاورات والعلوم على ثلاثة أنحاء (١) أحدها: المطابقة وهي أن يدل اللفظ على تمام ما وضع ذلك اللفظ له كدلالة لفظ الإنسان على مجموع الحيوان والناطق وثانيها: التضمنية وهي أن يدل اللفظ على جزء المعنى الموضوع له كدلالته على الحيوان فقط أو على الناطق فقط، وثالثها (٢): الدلالة الالتزامية وهي أن لا يدل اللفظ على الموضوع له ولا على جزئه بل على معنى خارج لازم للموضوع له واللازم هو ما ينتقل الذهن من الموضوع له إليه كدلالة الإنسان على قابل العلم وصنعة الكتابة (٣) وكدلالة لفظ العمى على البصر.

فصل: الدلالة التضمنية والالتزامية لا توجدان بدون المطابقة وذلك لأن الجزء لا يتصور بدون الكل وكذا اللازم بدون الملزوم والتابع (٤) لا يوجد بدون المتبوع والمطابقة قد توجد بدونهما لجواز أن يوضع اللفظ لمعنى بسيط لا جزء له ولا لازم له، فإن قلت: لا نسلم أن يوجد معنى لا لازم له فإن لكل معنى لازمًا البتة وأقله أنه ليس غيره. قلنا: المراد باللازم`,
   matnEn:`Chapter: It should be known that conventional verbal signification, which is the one considered in discourses and sciences, is of three kinds: First, "complete" (muṭābaqa) — the word indicates the entirety of what it was assigned to indicate, like the word "human" indicating the sum of "animal" and "rational." Second, "inclusive" (taḍamun) — the word indicates a part of the assigned meaning, like indicating only "animal" or only "rational." Third, "committed" (iltizām) — the word does not indicate the assigned meaning nor its part, but rather an external meaning that is concomitant (lāzim) to the assigned meaning. The concomitant is that to which the mind moves from the assigned meaning — like "human" indicating "capable of knowledge" or "the craft of writing," and the word "blindness" indicating "sight."

Chapter: Inclusive and committed signification do not exist without complete signification, because a part cannot be conceived without the whole, and likewise the concomitant without the concomitant-of (malzūm), and the follower (tābiʿ) cannot exist without the followed (matbūʿ). Complete signification may exist without them, since a word may be assigned to a simple meaning that has no part and no concomitant. If you say: we do not agree that a meaning exists without a concomitant — for every meaning has some concomitant, at least "it is not other" — we say: the intended concomitant is...`,
   sharhAr:`(١) اعلم أن الدلالة تنقسم باعتبار الدال وهو اللفظية وغيرها وباعتبار نفس الدلالة وهو أن تكون عقلية أو وضعية أو طبعية وباعتبار المدلول وهو أن يكون المعنى تمام الموضوع له أو جزؤه أو لازمه. (حاشية المرقاة/6)

(٢) اعلم أن اللفظ الموضوع لا يدل على ما هو خارج عن الموضوع له إلا لكونه لازمًا له، فلا بد في الدلالة الالتزامية من لزوم أعم من أن يكون ذهنيًا كالبصر بالنسبة إلى الأعمى أو عرفيًا كالوجود بالنسبة إلى الحاكم. (حاشية المرقاة/6)

(٣) فيه نظر ظاهر؛ إذ لا ينتقل من تصور الإنسان إلى تصور قابل العلم وصنعة الكتابة مع أن المعتبر في الالتزام اللزوم البين بالمعنى الأخص (وهو الذي بسببه ينتقل الذهن من الملزوم إلى اللازم) كما سيصرح فلا يصلح هذا مثالاً للمدلول الالتزامي إلا أن يقال: إنه مناقشة في المثال. (شرح المرقاة/37)

(٤) أي من حيث هو تابع لا يوجد بدون المتبوع، وإنما قيدناه بالحيثية احترازًا عن التابع الأعم؛ فإنه قد يوجد بدون المتبوع كالحرارة للنار، فإنها تابعة للنار وقد توجد بدونها كما في الشمس والحركة أما من حيث إنها تابعة للنار فلا توجد إلا معها. (المرضاة حاشية المرقاة/40)`,
   sharhEn:`(1) Know that signification is divided by the signifier (verbal vs. non-verbal), by the signification itself (rational, conventional, natural), and by the signified (the meaning being the entirety, part, or concomitant of the assigned meaning).

(2) Know that the assigned word does not indicate what is outside the assigned meaning except by being concomitant to it. So committed signification requires a concomitance, either mental (like sight relative to blindness) or conventional (like existence relative to a ruler).

(3) There is an obvious objection here: from the conception of "human" one does not move to "capable of knowledge" or "the craft of writing," whereas the requirement for commitment is manifest concomitance in the more specific sense (that by which the mind moves from the concomitant-of to the concomitant), as he will clarify. So this is not a suitable example for committed signification, unless it is said that it is a criticism of the example.

(4) i.e. insofar as it is a follower, it does not exist without the followed. We restricted it by this qualification to avoid the more general follower, which may exist without the followed — like heat for fire, which is a follower of fire but may exist without it, as in the sun and motion. But insofar as it is a follower of fire, it does not exist except with it.`},
  {page:10, topic:'اللازم البين — المفرد والمركب',
   matnAr:`هو اللازم البين الذي ينتقل الذهن من الملزوم إليه وقولك: "ليس غيره" ليس من اللوازم البينة لأنّا كثيرًا ما نتصور المعاني ولا يخطر ببالنا معنى الغير فضلاً عن كونه ليس غيره.

فصل: اللفظ الدال إما مفرد وإما مركب (١) ، فالمفرد (٢) ما لا يقصد بجزئه الدلالة على جزء معناه كدلالة همزة الاستفهام على معناه ودلالة "زيد" على مسماه ودلالة "عبد الله" على المعنى العلمي والمركب ما يقصد بجزئه الدلالة على جزء معناه كدلالة "زيد قائم" (٣) على معناه ودلالة "رامي السهم" على فحواه. ثم المفرد على أنحاء ثلاثة لأنه إن كان معناه مستقلاً بالمفهومية أي لم يكن في فهمه محتاجًا إلى ضم ضميمة فهو اسم إن لم`,
   matnEn:`...the manifest concomitant (al-lāzim al-bayyin) to which the mind moves from the concomitant-of. Your statement "it is not other" is not of the manifest concomitants, for we often conceive meanings and the meaning of "other" does not occur to us, let alone "it is not other."

Chapter: The signifying word is either simple (mufrad) or compound (murakkab). The simple is that whose part is not intended to indicate a part of its meaning — like the interrogative hamza indicating its meaning, the word "Zayd" indicating its referent, and the word "ʿAbd Allāh" indicating the proper noun. The compound is that whose part is intended to indicate a part of its meaning — like "Zayd is standing" indicating its meaning, and "the archer of the arrow" indicating its import. The simple is of three kinds: if its meaning is independent in concept (i.e. its understanding does not require adding anything), it is a noun if it is not...`,
   sharhAr:`(١) إن قيل: المركب ليس له وضع سوى وضع المفردات فلا يدخل في الدال بالمطابقة حتى يكون قسمًا له، قلنا: الوضع قد يكون شخصيًا –وهو تخصيص اللفظ المعين للمعنى- كوضع زيد لمعناه ووضع الإنسان لمسماه، وقد يكون نوعيًا، وهو على نوعين: الأول ما يكون بثبوت قاعدة كلية دالة على أن كل لفظ يكون بكيفية كذا فهو متعين للدلالة على معنى مخصوص يفهم منه بواسطة تعينه له، كما يقال: كل لفظ يكون على زنة فاعل فهو موضوع لذات من يقوم به الفعل وكل جمع عرف فهو لجميع تلك المسميات إلى غير ذلك، والثاني ما يكون بثبوت قاعدة دالة على أن كل لفظ موضوع يدل على معناه الموضوع له، وعند تعذر إرادة ذلك المعنى لمعنى يرد به مناسبة مخصوصة عند تحقيق القرينة، والمركبات والمشتقات وغيرها مما يكون دلالته على المعنى بالهيأة موضوعة للمعاني بالوضع النوعي بالمعنى الأول فلا إيراد، والمعتبر في الحقيقة هو الوضع الشخصي والقسم الأول من الوضع النوعي، أما القسم الثاني فمختص بالمجاز. (المرضاة حاشية المرقاة/42)

(٢) سواء لم يكن له جزء كهيئة الاستفهام أو كان جزء ولم يكن لمعناه جزء كاسم الجلالة أو كان له جزء ولم يكن له دلالة على المعنى كزيد أو كان له جزء دال على المعنى لكن لا يكون مدلوله جزءًا للمعنى المقصود كعبد الله علمًا أو كان له جزء دال على جزء المعنى المقصود لكن لا تكون دلالته مقصودة كالحيوان الناطق علمًا. (المرضاة/42)

(٣) وهو مركب، فإن لفظ زيد يدل على الحيوان الناطق مع التشخص المعين ولفظ "قائم" على ذات مهمة متصفة بالمعنى المصدرتي وهو القيام. (المرضاة حاشية المرقاة/42)`,
   sharhEn:`(1) If it is said: the compound has no assignment except that of its simples, so it does not fall under complete signification as a division — we say: assignment may be personal (assigning a specific word to a meaning, like "Zayd" or "human"), and it may be generic — of two kinds: first, establishing a general rule that every word with a certain form is assigned to a specific meaning understood by that form (e.g. every word on the pattern fāʿil is assigned to the doer of the action; every known plural is assigned to all those referents); second, establishing a rule that every assigned word indicates its assigned meaning, and when that meaning cannot be intended, the word is used for another meaning with a specific relation when the context is realized. Compounds, derivatives, and the like whose signification to meaning by form are assigned to meanings by the first kind of generic assignment — so no objection. What is actually considered is personal assignment and the first kind of generic assignment; the second is specific to metaphor.

(2) Whether it has no part (like the interrogative form), or has a part but its meaning has no part (like the Name of Majesty), or has a part but it does not indicate the meaning (like "Zayd"), or has a part indicating meaning but its signified is not part of the intended meaning (like "ʿAbd Allāh" as a proper noun), or has a part indicating part of the intended meaning but its signification is not intended (like "the rational animal" as a proper noun).

(3) It is compound, for the word "Zayd" indicates the rational animal with specific individuation, and the word "standing" indicates an unspecified essence qualified by the source-meaning, which is standing.`},
  {page:11, topic:'المفرد — الكلمة والفعل',
   matnAr:`يقترن (١) ذلك المعنى بزمان من الأزمنة الثلاثة، وإن اقترن به، وإن لم يكن معناه مستقلاً فهو أداة في عرف الميزانيين وحرف في اصطلاح النحويين هذا.

فصل: اعلم أنه قد ظن بعضهم أن الكلمة عند أهل الميزان هي ما يسمى في علم النحو بالفعل وليس هذا الظن بصواب (٢) فإن الفعل أعم من الكلمة ألا ترى أن نحو أضرب وتضرب ونضرب وأمثاله فعل عند النحاة وليس بكلمة عند المنطقيين؛ لأن الكلمة من أقسام المفرد ونحو أضرب ونضرب مثلاً ليس بمفرد بل هو مركب (٣) لدلالة جزء اللفظ على جزء المعنى فإن "الهمزة" تدل على المتكلم و"ضرب" على معنى الحدث (٤).`,
   matnEn:`...that meaning is accompanied by one of the three tenses; if it is accompanied by it, and if its meaning is not independent, it is a particle (adāh) in the terminology of the logicians and a letter (ḥarf) in the terminology of grammarians.

Chapter: Know that some have thought that the "word" (kalima) in the logicians' terminology is what is called a verb in grammar. This assumption is not correct, for the verb is broader than the word. Do you not see that forms like "aḍrib," "taḍrib," and "naḍrib" and their like are verbs for grammarians but not words for logicians? Because the word is one of the divisions of the simple, and forms like "aḍrib" and "naḍrib" are not simple but compound, since a part of the utterance indicates a part of the meaning — the hamza indicates the speaker, and "ḍarb" indicates the meaning of the event.`,
   sharhAr:`(١) سواء لم يقترن أصلاً كلفظ القرآن والحديث أو اقترن بأحد الأزمنة الثلاثة لكن لا يحسب الوضع مثل اسم الفاعل والمفعول ومثل أسماء الأفعال على قول. (المرضاة حاشية المرقاة/43)

(٢) لوجهين الأول أن الأفعال الناقصة أفعال عند النحاة وليست بكلمات عند أصحاب هذا الفن (أي المناطقة) بل هي أدوات زمانية، والثاني ما بينه بقوله: فإن الفعل أعم من الكلمة... إلخ. (شرح المرقاة/43)

(٣) لأنه يحتمل الصدق والكذب وكل محتمل للصدق والكذب مركب بخلاف الغائب، فإن الفاعل ليس جزءًا لمفهومه وإلا يلزم أن يكون ذكر الفاعل بعد الفعل في قولنا: "يضرب" تأكيدًا كما أن ذكر الفاعل في مثل قولنا: "أضرب أنا" و"تضرب أنت" تأكيدًا، وذا باطل بحسب محاورات العرب. (المرضاة حاشية المرقاة/43)

(٤) وهنا إشكال وهو أن "الهمزة" من قولنا: "أضرب" مثلاً وإن دلت على معنى لكن الباقي جزء ليس يدل على معنى بوجه من الوجوه وذلك أن المركب من ضاد ساكنة ثم راء ثم باء إما أن لا يكون لفظًا لا يكون دالاً على معنى من المعاني، وأجاب عنه الشيخ في "منطق الشفاء" بوجهين: الأول المركب ما يدل جزء لفظه على جزء معناه فيكفي فيه دلالة جزء واحد وأما دلالة الباقي على الباقي فمما لا يقتضيه حد المركب، الثاني أن الباقي من اللفظ يدل على الباقي من المعنى حال التركيب وهذا القدر كاف، وتفصيله أن الحدث والنسبة إلى زمان مخصوص مفهومان من "أضرب" وليست الهمزة دالة عليهما فتعين فهمهما من باقي اللفظ ودلالته حال التركيب كافية في كون اللفظ مركبًا فلا يضر عدم دلالته حال التحليل. (المرضاة حاشية المرقاة/43-44)`,
   sharhEn:`(1) Whether it is not accompanied at all (like the words of the Qur'an and Hadith), or is accompanied by one of the three tenses but the assignment is not counted (like active and passive participles, and verbs of action according to one view).

(2) For two reasons: first, the incomplete verbs are verbs for grammarians but not words for the logicians — rather they are temporal particles. Second, what he explained: that the verb is broader than the word.

(3) Because it is capable of truth and falsehood, and everything capable of truth and falsehood is compound — unlike the absent, for the agent is not part of its concept, otherwise mentioning the agent after the verb in "yaḍribu" would be emphasis, as mentioning the agent in "aḍribu anā" and "taḍribu anta" is emphasis, and that is false according to Arabic usage.

(4) There is a problem here: the hamza in "aḍribu" may indicate a meaning, but the remaining part does not indicate any meaning — for the combination of ḍād (sākin), rā', and bā' is either not a word and does not indicate any meaning. The Shaykh answered in his "Logic of the Healing" with two points: first, a compound is that whose part indicates part of its meaning, so the signification of one part suffices; the signification of the rest of the rest is not required by the definition of compound. Second, the remaining part of the utterance indicates the remaining part of the meaning in the context of composition, and that is sufficient. Its detail: the event and its relation to a specific time are understood from "aḍribu," and the hamza does not indicate them, so they must be understood from the rest of the utterance, and its signification in the context of composition is sufficient for the utterance to be compound, so its lack of signification when analyzed does not matter.`}
];

let currentMode='quiz', shuffledQ=[], currentQIdx=0;
let score={correct:0,wrong:0}, answered=false;
let fcIdx=0, fcFlipped=false;

function init(){
  shuffledQ=shuffle([...questions]);
  currentQIdx=0; score={correct:0,wrong:0};
  renderQuestion(); updateScore();
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function setMode(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['quizSection','flashcardSection','referenceSection','learnSection','resultsSection'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  ['scoreDisplay','progressWrap','progressLabel'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  if(mode==='quiz'){
    ['quizSection','scoreDisplay','progressWrap','progressLabel'].forEach(id=>document.getElementById(id).classList.remove('hidden'));
    init();
  } else if(mode==='flashcard'){
    document.getElementById('flashcardSection').classList.remove('hidden');
    fcIdx=0; fcFlipped=false; renderFlashcard();
  } else if(mode==='reference'){
    document.getElementById('referenceSection').classList.remove('hidden');
    renderReference();
  } else if(mode==='learn'){
    document.getElementById('learnSection').classList.remove('hidden');
    renderLearn();
  }
}

function renderQuestion(){
  if(currentQIdx>=shuffledQ.length){showResults();return;}
  answered=false;
  const q=shuffledQ[currentQIdx];
  document.getElementById('topicTag').textContent=q.topic;
  document.getElementById('questionText').textContent=q.question;
  const ar=document.getElementById('arabicText');
  if(q.arabic){ar.textContent=q.arabic;ar.style.display='block';}
  else{ar.style.display='none';}
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  const opts=q.options.map((o,i)=>({...o,idx:i}));
  shuffle(opts).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    const arLine=document.createElement('span');
    arLine.className='opt-ar';
    arLine.textContent=opt.ar||'';
    const enLine=document.createElement('span');
    enLine.className='opt-en';
    enLine.textContent=opt.en||opt.text||'';
    btn.appendChild(arLine);
    btn.appendChild(enLine);
    btn.onclick=()=>selectAnswer(opt.idx,btn,q);
    container.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  updateProgress();
}

function selectAnswer(idx,btn,q){
  if(answered)return; answered=true;
  document.querySelectorAll('.option-btn').forEach(b=>{
    b.disabled=true;
    const enText=b.querySelector('.opt-en').textContent;
    const oi=q.options.findIndex(o=>(o.en||o.text||'')=== enText);
    if(oi===q.correct)b.classList.add('correct');
  });
  const isCorrect=idx===q.correct;
  if(isCorrect){score.correct++;btn.classList.add('correct');}
  else{score.wrong++;btn.classList.add('wrong');}
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(isCorrect?'correct-fb':'wrong-fb');
  fb.innerHTML=`<div class="fb-title">${isCorrect?'✓ Correct!':'✗ Incorrect'}</div><div class="sharh-explain"><strong>من الشرح:</strong><br>${q.sharh}</div>`;
  document.getElementById('nextBtn').classList.add('show');
  updateScore();
}

function nextQuestion(){currentQIdx++;renderQuestion();}

function updateProgress(){
  const total=shuffledQ.length,done=currentQIdx;
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
  document.getElementById('progressLabel').textContent=`Question ${done+1} of ${total}`;
  document.getElementById('scoreLeft').textContent=total-done;
}
function updateScore(){
  document.getElementById('scoreCorrect').textContent=score.correct;
  document.getElementById('scoreWrong').textContent=score.wrong;
}
function showResults(){
  document.getElementById('quizSection').classList.add('hidden');
  document.getElementById('resultsSection').classList.remove('hidden');
  const total=shuffledQ.length,pct=Math.round(score.correct/total*100);
  document.getElementById('finalScore').textContent=pct+'%';
  let msg='';
  if(pct>=90)msg=`Excellent! ${score.correct}/${total} correct. Your mastery of المرقاة is strong.`;
  else if(pct>=70)msg=`Good work! ${score.correct}/${total} correct. Review the sections you missed.`;
  else if(pct>=50)msg=`${score.correct}/${total} correct. Go through the flashcards and reference then retry.`;
  else msg=`${score.correct}/${total} correct. Start with flashcards and the reference section first.`;
  document.getElementById('resultMsg').textContent=msg;
}
function restartQuiz(){
  document.getElementById('resultsSection').classList.add('hidden');
  document.getElementById('quizSection').classList.remove('hidden');
  init();
}

function renderFlashcard(){
  fcFlipped=false;
  const fc=flashcards[fcIdx];
  document.getElementById('fcTag').textContent=fc.topic;
  document.getElementById('fcFront').innerHTML=`<div style="font-size:16px;font-weight:700;color:#1a1209;line-height:1.5;">${fc.front}</div>`;
  document.getElementById('fcBack').innerHTML=`<div style="font-family:'Lato',sans-serif;font-size:13px;direction:ltr;text-align:left;color:#3a2a10;white-space:pre-line;line-height:1.8;">${fc.back}</div>`;
  document.getElementById('fcFront').classList.remove('hidden');
  document.getElementById('fcBack').classList.add('hidden');
  document.getElementById('fcLabel').textContent=`Card ${fcIdx+1} of ${flashcards.length} — tap to reveal answer`;
}
function flipCard(){
  fcFlipped=!fcFlipped;
  document.getElementById('fcFront').classList.toggle('hidden',fcFlipped);
  document.getElementById('fcBack').classList.toggle('hidden',!fcFlipped);
  document.getElementById('fcLabel').textContent=`Card ${fcIdx+1} of ${flashcards.length} — ${fcFlipped?'answer revealed':'tap to reveal answer'}`;
}
function fcNext(){fcIdx=(fcIdx+1)%flashcards.length;renderFlashcard();}
function fcPrev(){fcIdx=(fcIdx-1+flashcards.length)%flashcards.length;renderFlashcard();}

function renderReference(){
  document.getElementById('referenceSection').innerHTML=referenceData.map((sec,i)=>`
    <div class="ref-section">
      <div class="ref-header" onclick="toggleRef(${i})">
        <span>${sec.title}</span>
        <span class="ar-title">${sec.ar}</span>
      </div>
      <div class="ref-body" id="ref-${i}">${sec.content}</div>
    </div>`).join('');
  document.getElementById('ref-0').classList.add('open');
}
function toggleRef(i){document.getElementById('ref-'+i).classList.toggle('open');}

function renderLearn(){
  document.getElementById('learnSection').innerHTML=learnData.map((item,i)=>`
    <div class="learn-section">
      <div class="page-ref">Page ${item.page}</div>
      <div class="learn-topic">${item.topic}</div>
      <div class="matn-box">
        <div class="matn-ar">${item.matnAr}</div>
        <div class="matn-en"><strong>Translation:</strong> ${item.matnEn}</div>
      </div>
      ${item.sharhAr ? `
      <div class="sharh-box">
        <div class="sharh-ar">${item.sharhAr}</div>
        <div class="sharh-en"><strong>Translation:</strong> ${item.sharhEn}</div>
      </div>` : ''}
    </div>`).join('');
}

init();
</script>
</body>
</html>
