<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المرقاة — Complete Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
  :root {
    --ink:#1a1209;--parchment:#f5f0e8;--parchment-dark:#ede5d0;
    --red:#8b1a1a;--gold:#b8860b;--gold-light:#d4a017;
    --green:#2d5a27;--border:#c9a96e;--shadow:rgba(26,18,9,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ink);font-family:'Lato',sans-serif;color:var(--ink);min-height:100vh;}
  .app{max-width:700px;margin:0 auto;padding:20px 16px 40px;}
  .header{text-align:center;padding:28px 20px 20px;background:var(--parchment);border:2px solid var(--border);border-radius:4px;margin-bottom:16px;position:relative;}
  .header::before,.header::after{content:'❧';color:var(--red);font-size:18px;position:absolute;top:10px;}
  .header::before{left:14px;}.header::after{right:14px;}
  .header h1{font-family:'Amiri',serif;font-size:26px;color:var(--red);letter-spacing:1px;}
  .header .subtitle{font-size:13px;color:#6b5a3a;margin-top:4px;letter-spacing:2px;text-transform:uppercase;}
  .mode-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .mode-btn{flex:1;padding:10px 6px;border:2px solid var(--border);background:var(--parchment-dark);color:#6b5a3a;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all 0.2s;min-width:60px;}
  .mode-btn.active{background:var(--red);border-color:var(--red);color:var(--parchment);}
  .mode-btn:hover:not(.active){border-color:var(--red);color:var(--red);}
  .progress-bar-wrap{background:var(--parchment-dark);border:1px solid var(--border);border-radius:3px;height:8px;margin-bottom:10px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--gold);transition:width 0.4s ease;}
  .progress-label{font-size:11px;color:#b8a88a;text-align:right;margin-bottom:14px;letter-spacing:1px;}
  .card{background:var(--parchment);border:2px solid var(--border);border-radius:4px;padding:24px 20px;margin-bottom:14px;}
  .topic-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--parchment);background:var(--red);padding:3px 10px;border-radius:2px;margin-bottom:14px;}
  .arabic-text{font-family:'Amiri',serif;font-size:20px;color:var(--ink);line-height:1.8;text-align:right;direction:rtl;border-right:3px solid var(--gold);padding:12px 14px 12px 10px;margin-bottom:16px;background:var(--parchment-dark);border-radius:3px;}
  .question-text{font-size:17px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:18px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{
    padding:13px 16px;
    border:2px solid var(--border);
    background:white;
    color:var(--ink);
    font-family:'Lato',sans-serif;
    font-size:14px;
    text-align:left;
    cursor:pointer;
    border-radius:3px;
    transition:all 0.2s;
    line-height:1.4;
    display:flex;
    flex-direction:column;
    gap:4px;
    min-height:64px;
    justify-content:center;
  }
  .option-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(184,134,11,0.06);}
  .option-btn.correct{border-color:var(--green);background:rgba(45,90,39,0.08);color:var(--green);font-weight:700;}
  .option-btn.wrong{border-color:var(--red);background:rgba(139,26,26,0.07);color:var(--red);}
  .option-btn:disabled{cursor:default;}
  .option-btn .opt-ar{font-family:'Amiri',serif;font-size:17px;direction:rtl;text-align:right;}
  .option-btn .opt-en{font-size:13px;color:#5a4a2a;}
  .option-btn.correct .opt-en{color:var(--green);}
  .option-btn.wrong .opt-en{color:var(--red);}
  .feedback{margin-top:16px;padding:14px 16px;border-radius:3px;font-size:14px;line-height:1.6;display:none;}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:rgba(45,90,39,0.09);border:1px solid var(--green);color:#1a3d17;}
  .feedback.wrong-fb{background:rgba(139,26,26,0.07);border:1px solid var(--red);color:#5a0d0d;}
  .feedback .fb-title{font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .feedback .sharh-explain{margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,0.1);font-style:italic;color:#5a4a2a;}
  .next-btn{width:100%;padding:14px;background:var(--red);color:var(--parchment);border:none;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;margin-top:14px;display:none;transition:background 0.2s;}
  .next-btn:hover{background:#6b1212;}
  .next-btn.show{display:block;}
  .score-display{display:flex;gap:10px;margin-bottom:14px;}
  .score-box{flex:1;background:var(--parchment);border:1px solid var(--border);padding:10px;text-align:center;border-radius:3px;}
  .score-box .num{font-size:24px;font-weight:700;color:var(--red);font-family:'Amiri',serif;}
  .score-box .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#8b7355;}
  .results-card{background:var(--parchment);border:2px solid var(--gold);border-radius:4px;padding:32px 24px;text-align:center;}
  .results-card .final-pct{font-size:56px;font-weight:700;color:var(--red);font-family:'Amiri',serif;}
  .results-card .result-msg{font-size:15px;color:#3a2a10;margin:12px 0 20px;line-height:1.6;}
  .restart-btn{padding:12px 28px;background:var(--red);color:var(--parchment);border:none;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;}
  .fc-card{background:var(--parchment);border:2px solid var(--border);border-radius:4px;padding:28px 20px;min-height:200px;cursor:pointer;text-align:center;margin-bottom:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .fc-nav{display:flex;gap:10px;margin-bottom:14px;}
  .fc-nav button{flex:1;padding:11px;border:2px solid var(--border);background:var(--parchment-dark);color:#6b5a3a;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:3px;letter-spacing:1px;}
  .fc-nav button:hover{border-color:var(--red);color:var(--red);}
  .fc-label{font-size:11px;color:#b8a88a;text-align:center;margin-bottom:10px;letter-spacing:1px;}
  .ref-section{background:var(--parchment);border:2px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
  .ref-header{background:var(--red);color:var(--parchment);padding:12px 16px;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .ref-header .ar-title{font-family:'Amiri',serif;font-size:17px;}
  .ref-body{padding:16px;display:none;border-top:1px solid var(--border);}
  .ref-body.open{display:block;}
  .ref-body p{font-size:13px;line-height:1.7;margin-bottom:10px;color:#3a2a10;}
  .ref-body .def-arabic{font-family:'Amiri',serif;font-size:18px;direction:rtl;text-align:right;color:var(--red);background:var(--parchment-dark);padding:8px 12px;border-radius:3px;margin:8px 0;display:block;}
  .ref-body .example{background:rgba(184,134,11,0.08);border-left:3px solid var(--gold);padding:8px 12px;font-size:13px;margin:8px 0;border-radius:0 3px 3px 0;}
  .ref-body table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0;}
  .ref-body th{background:var(--parchment-dark);padding:7px 10px;text-align:left;border:1px solid var(--border);font-weight:700;color:var(--red);}
  .ref-body td{padding:7px 10px;border:1px solid var(--border);color:#3a2a10;}
  .ref-body td .ar-cell{font-family:'Amiri',serif;font-size:16px;direction:rtl;}
  .hidden{display:none!important;}

  /* Learn tab styles */
  .learn-section{background:var(--parchment);border:2px solid var(--border);border-radius:4px;padding:16px;margin-bottom:14px;}
  .learn-section .matn-box{background:var(--parchment-dark);border-right:4px solid var(--gold);padding:12px 16px;margin-bottom:12px;border-radius:3px;}
  .learn-section .matn-box .matn-ar{font-family:'Amiri',serif;font-size:18px;direction:rtl;text-align:right;line-height:1.8;color:var(--ink);}
  .learn-section .matn-box .matn-en{font-size:14px;color:#3a2a10;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
  .learn-section .sharh-box{background:white;border-left:4px solid var(--red);padding:12px 16px;margin-bottom:12px;border-radius:3px;}
  .learn-section .sharh-box .sharh-ar{font-family:'Amiri',serif;font-size:17px;direction:rtl;text-align:right;line-height:1.8;color:var(--ink);}
  .learn-section .sharh-box .sharh-en{font-size:14px;color:#3a2a10;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
  .learn-section .explain-box{background:rgba(184,134,11,0.06);border:1px solid var(--gold);padding:12px 16px;border-radius:3px;}
  .learn-section .explain-box .explain-en{font-size:14px;color:#3a2a10;line-height:1.7;}
  .learn-section .learn-topic{font-family:'Amiri',serif;font-size:20px;color:var(--red);margin-bottom:10px;border-bottom:2px solid var(--gold);padding-bottom:6px;}
  .learn-section .subtopic{font-weight:700;color:var(--red);margin:10px 0 4px;font-size:15px;}
  .learn-section .page-ref{font-size:12px;color:#8b7355;margin-bottom:8px;font-style:italic;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>المرقاة</h1>
    <div class="subtitle">Complete Trainer — All 91 Pages · 60 Questions · 25 Flashcards</div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('quiz',this)">Quiz</button>
    <button class="mode-btn" onclick="setMode('flashcard',this)">Flashcards</button>
    <button class="mode-btn" onclick="setMode('reference',this)">Reference</button>
    <button class="mode-btn" onclick="setMode('learn',this)">Learn</button>
  </div>

  <div class="score-display" id="scoreDisplay">
    <div class="score-box"><div class="num" id="scoreCorrect">0</div><div class="lbl">Correct</div></div>
    <div class="score-box"><div class="num" id="scoreWrong">0</div><div class="lbl">Wrong</div></div>
    <div class="score-box"><div class="num" id="scoreLeft">0</div><div class="lbl">Remaining</div></div>
  </div>

  <div id="progressWrap" class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div id="progressLabel" class="progress-label"></div>

  <div id="quizSection">
    <div class="card">
      <span class="topic-tag" id="topicTag"></span>
      <div class="arabic-text" id="arabicText"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <div id="flashcardSection" class="hidden">
    <div class="fc-label" id="fcLabel"></div>
    <div class="card fc-card" onclick="flipCard()">
      <span class="topic-tag" id="fcTag"></span>
      <div id="fcFront"></div>
      <div id="fcBack" class="hidden"></div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">← Previous</button>
      <button onclick="fcNext()">Next →</button>
    </div>
  </div>

  <div id="referenceSection" class="hidden"></div>
  <div id="learnSection" class="hidden"></div>

  <div id="resultsSection" class="hidden">
    <div class="results-card">
      <div class="final-pct" id="finalScore"></div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
    </div>
  </div>
</div>
<script>
// Helper: every option always has BOTH .ar and .en so the layout is always identical.
// We use a consistent two-row structure for every button.

const questions = [
  // ══════════════════════════════════════════════
  // 1. العلم — Knowledge & Its Meanings
  // ══════════════════════════════════════════════
  {topic:'العلم — Knowledge',
   arabic:'العلم يُطلق على معانٍ: أحدها حصول صورة الشيء في العقل',
   question:'According to the Mirqaat, how many primary meanings does the word "علم" carry?',
   options:[
     {ar:'ثلاثة',en:'Three'},
     {ar:'أربعة',en:'Four'},
     {ar:'خمسة',en:'Five'},
     {ar:'اثنان',en:'Two'}
   ],correct:2,
   sharh:'The text lists five meanings: (1) حصول صورة الشيء في العقل, (2) الصورة الحاصلة itself, (3) الحاضر عند المدرك, (4) قبول النفس — attributed to جمهور المتكلمين, (5) الإضافة الحاصلة بين العالم والمعلوم.'},

  {topic:'العلم — Knowledge',
   arabic:'',
   question:'Which definition of علم is specifically attributed to جمهور المتكلمين (majority of theologians)?',
   options:[
     {ar:'حصول صورة الشيء في العقل',en:'The form of a thing occurring in the intellect'},
     {ar:'الحاضر عند المدرك',en:'What is present before the perceiver'},
     {ar:'قبول النفس لتلك الصورة',en:'The soul\'s reception of that form'},
     {ar:'الإضافة بين العالم والمعلوم',en:'The relation between knower and known'}
   ],correct:2,
   sharh:'The fourth meaning — قبول النفس لتلك الصورة (the soul\'s reception of the form) — is specifically attributed to جمهور المتكلمين in the Sharh al-Mirqaat footnotes.'},

  // ══════════════════════════════════════════════
  // 2. التصوُّر والتصديق
  // ══════════════════════════════════════════════
  {topic:'التصوُّر والتصديق',
   arabic:'العلم ينقسم على قسمين: التصوُّر والتصديق',
   question:'Into what two primary divisions does العلم (knowledge) divide in logic?',
   options:[
     {ar:'البديهي والنظري',en:'Self-evident and theoretical'},
     {ar:'التصوُّر والتصديق',en:'Pure conception and assent/judgment'},
     {ar:'الحضوري والحصولي',en:'Presential and acquired knowledge'},
     {ar:'اليقين والظن',en:'Certainty and supposition'}
   ],correct:1,
   sharh:'العلم divides into تصوُّر (pure conceptual grasp without any judgment) and تصديق (assent/judgment). This is the fundamental division on which the entire علم الميزان is built.'},

  {topic:'التصوُّر والتصديق',
   arabic:'التصوُّر: الإدراك الخالي عن الحكم',
   question:'What is التصوُّر according to the Mirqaat?',
   options:[
     {ar:'إدراك يتضمن الحكم',en:'Perception that includes a judgment'},
     {ar:'إدراك خالٍ من الحكم إيجاباً أو سلباً',en:'Perception completely free from any affirmation or negation'},
     {ar:'التصديق بصحة القضية',en:'Assenting to the truth of a proposition'},
     {ar:'النسبة بين الموضوع والمحمول',en:'The relation between subject and predicate'}
   ],correct:1,
   sharh:'التصوُّر = الإدراك الخالي عن الحكم — pure conceptual grasp without any affirmation or negation. Example: simply grasping the concept of "زيد" or of "قيام" without yet asserting anything.'},

  {topic:'التصوُّر والتصديق',
   arabic:'التصديق: الحكم المقارِن للثلاثة',
   question:'التصديق (assent) requires three prior تصوُّرات. What are those three?',
   options:[
     {ar:'الموضوع والمحمول والنسبة الحكمية',en:'Subject, predicate, and the relational bond (النسبة)'},
     {ar:'الصغرى والكبرى والنتيجة',en:'Minor premise, major premise, and conclusion'},
     {ar:'الصورة والهيولى والمركَّب',en:'Form, matter, and composite'},
     {ar:'الكلي والجزئي والمفرد',en:'Universal, particular, and singular'}
   ],correct:0,
   sharh:'The three تصوُّرات required for تصديق: (1) تصوُّر المحكوم عليه (the subject), (2) تصوُّر المحكوم به (the predicate), (3) إدراك النسبة الحكمية المسماة بالحكم (grasping the relational bond). These are the building blocks of every proposition.'},

  {topic:'التصوُّر والتصديق',
   arabic:'الإمام الرازي: التصديق = مجموع الإدراكات الثلاثة',
   question:'How does Imam al-Razi differ from the Hukama (philosophers) on تصديق?',
   options:[
     {ar:'الرازي: التصديق = النسبة الرابطية فقط كالحكماء',en:'Al-Razi agrees: تصديق = only the النسبة رابطية'},
     {ar:'الرازي: التصديق = مجموع الثلاثة؛ الحكماء: التصديق = النسبة الرابطية وحدها',en:'Al-Razi: sum of all three perceptions; Philosophers: only the النسبة رابطية'},
     {ar:'الرازي: التصديق لا يحتاج إلى تصوُّر أصلاً',en:'Al-Razi: تصديق needs no prior تصوُّر at all'},
     {ar:'الرازي: التصديق خاص بالبرهان فقط',en:'Al-Razi: تصديق is exclusive to برهاني arguments'}
   ],correct:1,
   sharh:'الحكماء: تصديق = إدراك النسبة الرابطية (رابط) alone. الإمام الرازي: تصديق = مجموع الثلاثة — subject تصوُّر + predicate تصوُّر + النسبة حكمية. The main difference: is تصديق simple or composite?'},

  // ══════════════════════════════════════════════
  // 3. أقسام التصوُّر والتصديق
  // ══════════════════════════════════════════════
  {topic:'أقسام التصوُّر',
   arabic:'التصوُّر: ضروري ونظري',
   question:'What distinguishes التصوُّر الضروري from التصوُّر النظري?',
   options:[
     {ar:'الضروري: من الحواس. النظري: من العقل وحده',en:'Ḍarūrī from sense perception; Naẓarī from reason alone'},
     {ar:'الضروري: بلا كسب كالحرارة. النظري: يحتاج فكراً كتصوُّر الجن والملائكة',en:'Ḍarūrī: without effort (e.g. heat/cold); Naẓarī: requires فكر (e.g. angels, jinn)'},
     {ar:'الضروري: كلي. النظري: جزئي',en:'Ḍarūrī is universal; Naẓarī is particular'},
     {ar:'الضروري: للجواهر. النظري: للأعراض',en:'Ḍarūrī pertains to substances; Naẓarī to accidents'}
   ],correct:1,
   sharh:'التصوُّر الضروري = obtained without effort, like تصوُّرنا الحرارةَ والبرودة. التصوُّر النظري = requires فكر ونظر (exertion), like tصوُّر الجن والملائكة — you need to construct their descriptions.'},

  {topic:'التصديق — أقسام',
   arabic:'التصديق: بديهي ونظري',
   question:'Which of the following is a correct example of التصديق البديهي (self-evident assent)?',
   options:[
     {ar:'العالم حادث',en:'The world is temporally originated (requires argument)'},
     {ar:'الصانع موجود',en:'The Maker exists (requires argument)'},
     {ar:'الكل أعظم من الجزء',en:'The whole is greater than the part (evident without reasoning)'},
     {ar:'الإنسان ناطق',en:'Man is rational (requires species-definition knowledge)'}
   ],correct:2,
   sharh:'التصديق البديهي = حاصل من غير فكر وكسب. The text gives "الكل أعظم من الجزء" and "الاثنان نصف الأربعة" as examples. "العالم حادث" and "الصانع موجود" are النظري — they require constructed reasoning.'},

  // ══════════════════════════════════════════════
  // 4. النظر والمنطق
  // ══════════════════════════════════════════════
  {topic:'النظر والمنطق',
   arabic:'النظر: ترتيب أمور معلومة ليتأدى إلى تحصيل المجهول',
   question:'How does the Mirqaat define النظر (discursive thinking) technically?',
   options:[
     {ar:'ترتيب أمور معلومة لتحصيل مجهول',en:'Arranging known matters so as to arrive at an unknown'},
     {ar:'البديهيات الحاصلة بلا فكر',en:'Self-evident truths obtained without thinking'},
     {ar:'إدراك الجزئيات بالحواس',en:'Perceiving particulars through the senses'},
     {ar:'حفظ الأقيسة ومقدماتها',en:'Memorising syllogisms and their premises'}
   ],correct:0,
   sharh:'النظر in the terminology: ترتيب أمور معلومة ليتأدى ذلك الترتيب إلى تحصيل المجهول. E.g. "العالم متغير + كل متغير حادث → العالم حادث." The arrangement of knowns produces the unknown.'},

  {topic:'تسمية المنطق والميزان',
   arabic:'المنطق: قانون عاصم عن الخطأ في الفكر',
   question:'The Mirqaat gives two reasons for calling logic both "المنطق" and "الميزان". What are they?',
   options:[
     {ar:'المنطق: الكلام الفصيح. الميزان: الكتاب المنزَّل',en:'Manṭiq: eloquent speech; Mīzān: revealed scripture'},
     {ar:'المنطق: أثّر في النطق الظاهري والباطني. الميزان: قسطاس يوزن به الأفكار',en:'Manṭiq: it perfects inner and outer speech; Mīzān: a scale to weigh thoughts'},
     {ar:'المنطق: من الميراث اليوناني. الميزان: من الاصطلاح العربي',en:'Manṭiq: Greek origin; Mīzān: Arabic coinage only'},
     {ar:'المنطق: للعلوم الدينية. الميزان: للعلوم الطبيعية',en:'Manṭiq: for religious sciences; Mīzān: for natural sciences'}
   ],correct:1,
   sharh:'تسميته بالمنطق: it strengthens النطق الظاهري (external speech) AND النطق الباطني (internal intellection). تسميته بالميزان: because it is قسطاس للعقل توزن به الأفكار — a scale by which thoughts are weighed.'},

  // ══════════════════════════════════════════════
  // 5. الدلالة
  // ══════════════════════════════════════════════
  {topic:'الدلالة — تعريف',
   arabic:'الدلالة: كون الشيء بحيث يلزم من العلم به العلم بشيء آخر',
   question:'What is the technical definition of الدلالة (signification) in the Mirqaat?',
   options:[
     {ar:'صوت اللفظ الدال على المعنى',en:'The phonetic form of a word pointing to meaning'},
     {ar:'كون الشيء يلزم من العلم به العلم بشيء آخر',en:'A state such that knowing one thing necessitates knowing another'},
     {ar:'وضع اللفظ من قِبَل أهل اللغة',en:'The placement of a word by language authorities'},
     {ar:'حضور الشيء في الذهن مباشرةً',en:'The direct presence of a thing in the mind'}
   ],correct:1,
   sharh:'الدلالة = كون الشيء بحيث يلزم من العلم به العلم بشيء آخر. The first thing is الدال, the second is المدلول. This applies to ALL six types of دلالة.'},

  {topic:'الدلالة — أقسام',
   arabic:'الدلالة: لفظية وغير لفظية، وكل منهما: وضعية وطبعية وعقلية',
   question:'Which of the following is NOT one of the six types of دلالة listed in the Mirqaat?',
   options:[
     {ar:'اللفظية الطبعية',en:'Verbal-natural (e.g. sound of pain)'},
     {ar:'غير اللفظية العقلية',en:'Non-verbal rational (e.g. smoke → fire)'},
     {ar:'اللفظية المجازية',en:'Verbal-metaphorical — NOT a category in this division'},
     {ar:'غير اللفظية الوضعية',en:'Non-verbal conventional (e.g. written signs)'}
   ],correct:2,
   sharh:'The six دلالات are: verbal (وضعية, طبعية, عقلية) + non-verbal (وضعية, طبعية, عقلية). There is no primary category called "مجازية" — مجاز is a sub-issue within الحقيقة والمجاز, not a separate signification type.'},

  {topic:'الدلالة اللفظية الوضعية — أقسام',
   arabic:'الدلالة اللفظية الوضعية: مطابقة وتضمُّن والتزام',
   question:'What is الدلالة المطابقية?',
   options:[
     {ar:'دلالة اللفظ على جزء معناه الموضوع له',en:'The word indicating only PART of its designated meaning'},
     {ar:'دلالة اللفظ على تمام معناه الموضوع له',en:'The word indicating the FULL extent of its designated meaning'},
     {ar:'دلالة اللفظ على لازم معناه الخارجي',en:'The word indicating an external concomitant of its meaning'},
     {ar:'دلالة اللفظ على معنى مجازي',en:'The word indicating a metaphorical meaning'}
   ],correct:1,
   sharh:'المطابقة = دلالة اللفظ على تمام الموضوع له. E.g. "إنسان" indicating the WHOLE concept "حيوان ناطق". التضمُّن = PART of موضوع له. الالتزام = something OUTSIDE and concomitant to موضوع له.'},

  {topic:'الدلالة الالتزامية',
   arabic:'اللازم البيِّن الذي ينتقل الذهن من الملزوم إليه',
   question:'For الدلالة الالتزامية to be logically valid, what condition must the لازم (concomitant) satisfy?',
   options:[
     {ar:'أن يكون اللازم خارجاً عن الماهية',en:'The لازم must be external to the essence'},
     {ar:'أن يكون اللازم أشهر من الملزوم',en:'The لازم must be more well-known than the ملزوم'},
     {ar:'أن يكون اللازم بيِّناً يلتقله الذهن تلقائياً من الملزوم',en:'The لازم must be bayyin — the mind moves to it readily upon grasping ملزوم'},
     {ar:'أن يكون اللازم موجوداً في الخارج دائماً',en:'The لازم must always exist externally'}
   ],correct:2,
   sharh:'الالتزام المعتبر في المنطق = اللازم البيِّن — the manifest concomitant. The mind moves from the ملزوم to the لازم naturally. Non-manifest لازم (requiring proof) does not count here. E.g. "عمى" → "بصر" (evident); but not every external attribute.'},

  // ══════════════════════════════════════════════
  // 6. المفرد والمركب / الحقيقة والمجاز
  // ══════════════════════════════════════════════
  {topic:'المفرد والمركب',
   arabic:'المفرد: ما لا يقصد بجزئه الدلالة على جزء معناه',
   question:'How does علم الميزان distinguish المفرد from المركب?',
   options:[
     {ar:'المفرد: حرف واحد. المركب: أكثر من حرف',en:'Mufrad: one letter; Murakkab: more than one letter'},
     {ar:'المفرد: لا يُقصد بجزئه الدلالة على جزء معناه. المركب: يُقصد',en:'Mufrad: parts NOT intended to signify parts of meaning; Murakkab: parts ARE so intended'},
     {ar:'المفرد: الاسم فقط. المركب: الجملة',en:'Mufrad: noun only; Murakkab: sentence only'},
     {ar:'المفرد: ما لا يمكن نفيه. المركب: ما يمكن نفيه',en:'Mufrad: cannot be negated; Murakkab: can be negated'}
   ],correct:1,
   sharh:'المفرد = what whose parts are NOT intended to independently signify parts of its meaning. E.g. "زيد" — the "زاء" alone means nothing. المركب = whose parts ARE intended to signify parts of meaning. E.g. "زيد قائم."'},

  {topic:'الحقيقة والمجاز',
   arabic:'الحقيقة: اللفظ المستعمَل في موضوعه الأصلي',
   question:'What is the علامة (sign) that distinguishes الحقيقة from المجاز?',
   options:[
     {ar:'الحقيقة: تبادر الذهن بلا قرينة. المجاز: يحتاج قرينة',en:'Ḥaqīqa: mind jumps to meaning without context clue; Majāz: needs a contextual indicator (قرينة)'},
     {ar:'الحقيقة: قديم. المجاز: حديث',en:'Ḥaqīqa: ancient; Majāz: modern usage'},
     {ar:'الحقيقة: في الشعر. المجاز: في النثر',en:'Ḥaqīqa: in poetry; Majāz: in prose'},
     {ar:'الحقيقة: في القرآن. المجاز: في غيره',en:'Ḥaqīqa: only in the Quran; Majāz: elsewhere'}
   ],correct:0,
   sharh:'علامة الحقيقة: تبادر الذهن إلى المعنى الموضوع له بلا قرينة. علامة المجاز: صحة نفيه عن الشيء (you can meaningfully deny the metaphorical application) AND needing a قرينة to indicate it.'},

  {topic:'المشترك والمرادف',
   arabic:'المشترك: وضع تارة للذهب وتارة للباصرة وتارة للركبة',
   question:'What is اللفظ المشترك (homonymous term) and how does it differ from المشترك المعنوي?',
   options:[
     {ar:'المشترك اللفظي: معنى واحد لأفراد كثيرة. المعنوي: أوضاع متعددة',en:'Lafẓī: one meaning for many individuals; Maʿnawī: multiple definitions'},
     {ar:'المشترك اللفظي: أوضاع متعددة لكل معنى. المعنوي: معنى واحد لأفراد كثيرة',en:'Lafẓī: separate definition for EACH meaning; Maʿnawī: one meaning applied to many individuals'},
     {ar:'كلاهما نفس الشيء',en:'Both terms refer to the same thing'},
     {ar:'المشترك اللفظي أصل والمعنوي مجاز',en:'Lafẓī is the original; Maʿnawī is metaphorical'}
   ],correct:1,
   sharh:'المشترك اللفظي = single word with multiple SEPARATE definitions (each with its own وضع), e.g. "عين" for eye, spring, sun, etc. المشترك المعنوي = word with ONE meaning applicable to MANY individuals, e.g. "إنسان" for زيد, عمرو, etc. This is actually the كلي.'},

  {topic:'المنقول — أقسام',
   arabic:'المنقول: نُقل من معناه الأصلي إلى معنى آخر',
   question:'What are the three types of المنقول?',
   options:[
     {ar:'المنقول المادي والمعنوي والحسي',en:'Material, abstract, and sensory transfers'},
     {ar:'المنقول العرفي والشرعي والاصطلاحي',en:'Common-usage (ʿurfī), Sharia (sharʿī), and technical (iṣṭilāḥī)'},
     {ar:'المنقول المجازي والحقيقي والمشترك',en:'Metaphorical, literal, and homonymous transfers'},
     {ar:'المنقول الشعري والنثري والعلمي',en:'Poetic, prosaic, and scientific transfers'}
   ],correct:1,
   sharh:'Three types by the نَاقِل: (1) العرفي العام — common usage, e.g. الدابة (originally = anything that walks) → horse. (2) الشرعي — by the Lawgiver, e.g. الصلاة (originally = supplication) → the ritual prayer. (3) الاصطلاحي — by specialists, e.g. الاسم in grammar.'},

  // ══════════════════════════════════════════════
  // 7. الكليات الخمس
  // ══════════════════════════════════════════════
  {topic:'الكليات الخمس',
   arabic:'الكليات خمس: الجنس، النوع، الفصل، الخاصة، العرض العام',
   question:'What are the الكليات الخمس (five universals)?',
   options:[
     {ar:'الجوهر والكم والكيف والإضافة والأين',en:'Substance, Quantity, Quality, Relation, Place'},
     {ar:'الجنس والنوع والفصل والخاصة والعرض العام',en:'Genus, Species, Differentia, Proprium, General Accident'},
     {ar:'اليقين والظن والشك والوهم والجهل',en:'Certainty, Supposition, Doubt, Illusion, Ignorance'},
     {ar:'الموجبة الكلية والسالبة والجزئية والشخصية والمهملة',en:'Universal affirmative, negative, particular, singular, and indefinite'}
   ],correct:1,
   sharh:'The five: (1) الجنس — genus (e.g. الحيوان). (2) النوع — species (e.g. الإنسان). (3) الفصل — differentia (e.g. الناطق). (4) الخاصة — proprium (e.g. الضاحك). (5) العرض العام — general accident (e.g. الماشي). First three = ذاتيات; last two = عرضيات.'},

  {topic:'الجنس',
   arabic:'الجنس: كلي مقول على كثيرين مختلفين بالحقائق في جواب ما هو',
   question:'What makes الجنس (genus) distinct from النوع (species)?',
   options:[
     {ar:'الجنس: يُطلق على حقيقة واحدة. النوع: على حقائق متعددة',en:'Genus: one reality; Species: multiple realities'},
     {ar:'الجنس: مقول على كثيرين مختلفي الحقائق. النوع: مقول على كثيرين متفقي الحقائق',en:'Genus: predicated of things DIFFERING in reality; Species: of things AGREEING in reality'},
     {ar:'الجنس دائماً جنس الأجناس. النوع دائماً نوع الأنواع',en:'Genus always = genus of genera; Species always = species of species'},
     {ar:'الجنس يجيب على أي شيء هو. النوع يجيب على ما هو',en:'Genus answers "which thing?"; Species answers "what is it?"'}
   ],correct:1,
   sharh:'الجنس = كلي مقول على كثيرين مختلفين بالحقائق — e.g. الحيوان predicated of إنسان, فرس, غنم (all different realities). النوع = كلي مقول على كثيرين متفقين بالحقائق — e.g. إنسان predicated of زيد, عمرو (same reality).'},

  {topic:'الفصل',
   arabic:'الفصل: كلي مقول على الشيء في جواب أي شيء هو في ذاته',
   question:'What question does الفصل (differentia) answer, and what is its role in a حد تام?',
   options:[
     {ar:'يجيب: ما هو؟ ويُكوِّن وحده الحد التام',en:'Answers: "What is it?" — forms the complete definition alone'},
     {ar:'يجيب: أي شيء هو في ذاته؟ ويُفرِّق النوع عما يشاركه في الجنس',en:'Answers: "Which thing in its essence?" — distinguishes species from genus-mates'},
     {ar:'يجيب: كم هو؟ ويحدد الكمية',en:'Answers: "How many?" — determines quantity'},
     {ar:'يجيب: أي عَرَض له؟ ويبيّن الصفات الخارجية',en:'Answers: "What accident does it have?" — describes external properties'}
   ],correct:1,
   sharh:'الفصل answers "أي شيء هو في ذاته?" It distinguishes the species from other things under the same genus. E.g. الناطق distinguishes إنسان from فرس, نملة, etc., under الحيوان. In الحد التام: جنس قريب + فصل قريب.'},

  {topic:'الخاصة والعرض العام',
   arabic:'الخاصة: محمول على أفراد حقيقة واحدة. العرض العام: مشترك بين حقائق',
   question:'How does الخاصة (proprium) differ from العرض العام (general accident)?',
   options:[
     {ar:'الخاصة: خاص بحقيقة واحدة (كالضاحك للإنسان). العرض العام: مشترك بين حقائق متعددة (كالماشي)',en:'Proprium: belongs to ONE species only (e.g. الضاحك → إنسان); General accident: shared among many'},
     {ar:'الخاصة: لازم الماهية. العرض العام: مفارق',en:'Proprium: inseparable from essence; General accident: separable'},
     {ar:'الخاصة: مقوِّم للنوع. العرض العام: جزء من الحد التام',en:'Proprium: constitutes the species; General accident: part of the complete definition'},
     {ar:'كلاهما متطابقان في التعريف',en:'Both are identical in definition'}
   ],correct:0,
   sharh:'الخاصة = كلي خارج عن الحقيقة محمول على أفراد واقعة تحت حقيقة واحدة فقط — e.g. الضاحك/الكاتب for إنسان only. العرض العام = also outside the حقيقة but applies to MORE than one species — e.g. الماشي for both إنسان and فرس.'},

  // ══════════════════════════════════════════════
  // 8. الكلي والجزئي / النسب الأربع
  // ══════════════════════════════════════════════
  {topic:'الكلي والجزئي',
   arabic:'الجزئي: ما يمنع نفس تصوُّره عن الصدق على كثيرين',
   question:'What is the definition of الجزئي (particular) according to the Mirqaat?',
   options:[
     {ar:'ما يصدق على فرد واحد من الواقع',en:'What applies to only one individual in external reality'},
     {ar:'ما يمنع نفس تصوُّره عن الصدق على كثيرين',en:'A concept whose very notion prevents it from applying to many simultaneously'},
     {ar:'ما لا ينقسم إلى أجزاء',en:'What cannot be divided into parts'},
     {ar:'ما يُطلق على الفرد بسبب خصائصه العَرَضية',en:'What is applied to an individual by virtue of its accidental properties'}
   ],correct:1,
   sharh:'الجزئي = ما يمنع نفس تصوُّره عن الصدق على كثيرين — the concept itself, by being grasped, prevents multiple application. E.g. "زيد" or "هذا الفرس." الكلي = ما لا يمنع — nothing in the concept prevents multiple predication.'},

  {topic:'النسب بين الكليين',
   arabic:'النسب الأربع: التساوي، التباين، عموم وخصوص مطلقاً، عموم وخصوص من وجه',
   question:'What are the four possible relationships between any two universals?',
   options:[
     {ar:'العلة والمعلول والتلازم والتضاد',en:'Causation, effect-hood, entailment, and opposition'},
     {ar:'التساوي والتباين والعموم والخصوص مطلقاً والعموم والخصوص من وجه',en:'Equality, complete disjunction, one-way inclusion, and partial overlap'},
     {ar:'الجنسية والنوعية والفصلية والعرضية',en:'Genus-relation, species-relation, differentia-relation, accident-relation'},
     {ar:'الصدق والكذب والإطلاق والتقييد',en:'Truth, falsehood, unrestricted, and restricted'}
   ],correct:1,
   sharh:'(1) التساوي: both predicated of exactly the same things — e.g. الإنسان/الناطق. (2) التباين: nothing shared — e.g. الإنسان/الفرس. (3) عموم وخصوص مطلقاً: one wholly includes the other — e.g. الحيوان⊃إنسان. (4) عموم وخصوص من وجه: partial overlap — e.g. الأبيض/الحيوان (البط is both; ثلج only white; فيل only animal).'},

  // ══════════════════════════════════════════════
  // 9. التعريفات
  // ══════════════════════════════════════════════
  {topic:'التعريفات الأربعة',
   arabic:'معرِّف الشيء: ما يحمل عليه لإفادة تصوُّره',
   question:'What are the four types of تعريف (definition) in the Mirqaat?',
   options:[
     {ar:'الحد والرسم والقياس والاستقراء',en:'Ḥadd, Rasm, Syllogism, and Induction'},
     {ar:'الحد التام والحد الناقص والرسم التام والرسم الناقص',en:'Complete definition, Incomplete definition, Complete description, Incomplete description'},
     {ar:'الجامع والمانع والوجودي والعدمي',en:'Inclusive, Exclusive, Positive, and Negative'},
     {ar:'البيِّن والخفي واليقيني والظني',en:'Clear, Hidden, Certain, and Probable'}
   ],correct:1,
   sharh:'(1) الحد التام: جنس قريب + فصل قريب — e.g. "حيوان ناطق" for إنسان. (2) الحد الناقص: فصل alone or بعيد+فصل. (3) الرسم التام: جنس قريب + خاصة — e.g. "حيوان ضاحك". (4) الرسم الناقص: خاصة alone. العرض العام alone NEVER serves as a definition — لا يفيد التمييز.'},

  {topic:'الحد التام والرسم التام',
   arabic:'الحد التام: جنس قريب وفصل قريب',
   question:'Why can العرض العام alone not serve as a valid definition?',
   options:[
     {ar:'لأنه يصعب تحديده بدقة',en:'Because it is difficult to identify precisely'},
     {ar:'لأنه لا يفيد التمييز — يصدق على حقائق متعددة',en:'Because it does NOT uniquely distinguish the thing — it applies to multiple species'},
     {ar:'لأنه ليس كلياً',en:'Because it is not a universal at all'},
     {ar:'لأنه يتغير بمرور الوقت',en:'Because it changes over time'}
   ],correct:1,
   sharh:'A definition must يفيد التمييز — uniquely identify the definiendum. العرض العام applies to MORE than one species (e.g. الماشي covers humans and horses), so using it alone fails to exclude other species from the definition.'},

  // ══════════════════════════════════════════════
  // 10. القضايا
  // ══════════════════════════════════════════════
  {topic:'القضية — تعريف',
   arabic:'القضية: قول يحتمل الصدق والكذب',
   question:'What is the definition of القضية (proposition) in the Mirqaat?',
   options:[
     {ar:'أي عبارة يُنطق بها',en:'Any utterance that is spoken'},
     {ar:'سؤال يُطرح لاستخراج معرفة',en:'A question posed to elicit knowledge'},
     {ar:'قول يحتمل الصدق والكذب',en:'A statement capable of being true or false'},
     {ar:'أمر يوجِّه الفعل',en:'A command that directs an action'}
   ],correct:2,
   sharh:'القضية = قول يحتمل الصدق والكذب. A proposition is capable of being true or false — unlike commands (أوامر), questions (استفهام), and wishes (تمني). It divides into حملية (categorical) and شرطية (conditional).'},

  {topic:'القضية — الحملية والشرطية',
   arabic:'الحملية: موضوع، محمول، رابطة',
   question:'In the proposition "زيد هو قائم", identify the three components correctly:',
   options:[
     {ar:'زيد: محمول، قائم: موضوع، هو: رابطة',en:'"Zayd" = predicate, "qāʾim" = subject, "huwa" = copula'},
     {ar:'زيد: موضوع، قائم: محمول، هو: رابطة (في العربية تُحذف أحياناً)',en:'"Zayd" = subject, "qāʾim" = predicate, "huwa" = copula (sometimes omitted in Arabic)'},
     {ar:'زيد: مقدم، قائم: تالٍ، هو: رابطة الشرطية',en:'"Zayd" = antecedent, "qāʾim" = consequent, "huwa" = conditional copula'},
     {ar:'الثلاثة موضوعات بلا محمول',en:'All three are subjects with no predicate'}
   ],correct:1,
   sharh:'الحملية has three parts: (1) الموضوع = المحكوم عليه = "زيد". (2) المحمول = المحكوم به = "قائم". (3) الرابطة = "هو" — the copula, which is deleted in Arabic speech but intended in meaning.'},

  {topic:'المحصورات الأربع',
   arabic:'المحصورات: موجبة كلية، سالبة كلية، موجبة جزئية، سالبة جزئية',
   question:'What are the four quantified categorical propositions (المحصورات)?',
   options:[
     {ar:'الشخصية والمهملة والطبيعية والحقيقية',en:'Personal, Indefinite, Natural, and Real'},
     {ar:'الموجبة الكلية والسالبة الكلية والموجبة الجزئية والسالبة الجزئية',en:'Universal affirmative, Universal negative, Particular affirmative, Particular negative'},
     {ar:'اللزومية والاتفاقية والعنادية والوقتية',en:'Necessary, Coincidental, Incompatible, and Temporal'},
     {ar:'الضرورية والدائمة والمشروطة والممكنة',en:'Necessary, Permanent, Conditional, and Possible'}
   ],correct:1,
   sharh:'(1) الموجبة الكلية: كل إنسان حيوان. (2) السالبة الكلية: لا شيء من الزنجي بأبيض. (3) الموجبة الجزئية: بعض الحيوان أسود. (4) السالبة الجزئية: بعض الإنسان ليس بأسود. These map to A, E, I, O in classical logic.'},

  {topic:'القضايا الشرطية',
   arabic:'الشرطية: متصلة ومنفصلة',
   question:'What is the difference between the متصلة لزومية and the متصلة اتفاقية?',
   options:[
     {ar:'اللزومية: الارتباط بسبب لزوم حقيقي. الاتفاقية: الارتباط بالمصادفة لا بالضرورة',en:'Luzūmiyya: connection due to real necessity; Itifāqiyya: connection by coincidence, not necessity'},
     {ar:'اللزومية: في الإيجاب. الاتفاقية: في السلب',en:'Luzūmiyya: in affirmative; Itifāqiyya: in negative'},
     {ar:'اللزومية: كلية. الاتفاقية: جزئية',en:'Luzūmiyya: universal; Itifāqiyya: particular'},
     {ar:'كلاهما نفس الشيء',en:'Both are the same thing'}
   ],correct:0,
   sharh:'اللزومية = connection between مقدم and تالي is a real necessary (لزوم) relation — e.g. "إن كانت الشمس طالعة كان النهار موجوداً." الاتفاقية = the connection holds by coincidence only — e.g. "إذا كان الإنسان ناطقاً فالحمار ناهق" (no real link).'},

  {topic:'المنفصلة — أقسام',
   arabic:'المنفصلة: حقيقية، مانعة الجمع، مانعة الخلو',
   question:'What is المنفصلة الحقيقية?',
   options:[
     {ar:'تمنع اجتماع الجزأين في الصدق دون الكذب',en:'Prevents both parts from being simultaneously true, but allows both false'},
     {ar:'تمنع خلو الجزأين من الصدق دون الاجتماع',en:'Prevents both parts from being false simultaneously, but allows both true'},
     {ar:'تمنع اجتماع الجزأين في الصدق وتمنع خلوهما من الصدق',en:'Prevents both from being simultaneously true AND from being simultaneously false'},
     {ar:'تجوز اجتماع الجزأين وخلوهما',en:'Allows both to be true or both to be false'}
   ],correct:2,
   sharh:'المنفصلة الحقيقية = تمنع الاجتماع في الصدق وتمنع الخلو من الصدق — e.g. "هذا العدد إما زوج أو فرد." You cannot have a number that is both even and odd, nor a number that is neither. Contrast: مانعة الجمع (only bars co-truth); مانعة الخلو (only bars co-falsehood).'},

  // ══════════════════════════════════════════════
  // 11. التناقض والعكس
  // ══════════════════════════════════════════════
  {topic:'التناقض — الوحدات الثماني',
   arabic:'التناقض: اختلاف القضيتين بالإيجاب والسلب',
   question:'How many وحدات (unities) does valid تناقض between two propositions require?',
   options:[
     {ar:'أربع وحدات',en:'Four unities'},
     {ar:'ست وحدات',en:'Six unities'},
     {ar:'ثماني وحدات',en:'Eight unities'},
     {ar:'وحدتان: الموضوع والمحمول فقط',en:'Two unities: subject and predicate only'}
   ],correct:2,
   sharh:'Eight وحدات: (1) الموضوع, (2) المحمول, (3) المكان, (4) الزمان, (5) القوة والفعل, (6) الشرط, (7) الجزء والكل, (8) الإضافة. Without all eight, the two propositions may not be genuine contradictories — both could be true or both false simultaneously.'},

  {topic:'التناقض — شرط الكم',
   arabic:'لا بد في التناقض من اختلاف الكم',
   question:'In contradictory pairs among quantified propositions, what must differ in الكم (quantity)?',
   options:[
     {ar:'كلتاهما يجب أن تكون كليتين',en:'Both must be universal propositions'},
     {ar:'إحداهما كلية والأخرى جزئية',en:'One must be universal (kullī) and the other particular (juzʾī)'},
     {ar:'كلتاهما يجب أن تكون جزئيتين',en:'Both must be particular propositions'},
     {ar:'إحداهما شخصية والأخرى مهملة',en:'One must be personal and the other indefinite'}
   ],correct:1,
   sharh:'If both are كليتان they may both be false (e.g. "كل حيوان إنسان" and "لا شيء من الحيوان بإنسان" — both false). If both جزئيتان they may both be true. For genuine تناقض one must be كلية and the other جزئية. Pairs: A↔O and E↔I.'},

  {topic:'العكس المستوي',
   arabic:'العكس المستوي: جعل الجزء الأول ثانياً والثاني أولاً',
   question:'When الموجبة الكلية (A-proposition) is simply converted (عكس مستوي), what is the result?',
   options:[
     {ar:'موجبة كلية — نفس النوع',en:'Universal affirmative — same type'},
     {ar:'موجبة جزئية',en:'Particular affirmative (I-proposition)'},
     {ar:'سالبة كلية',en:'Universal negative (E-proposition)'},
     {ar:'لا عكس صحيح للموجبة الكلية',en:'No valid converse exists for the universal affirmative'}
   ],correct:1,
   sharh:'"كل إنسان حيوان" converts to "بعض الحيوان إنسان" — goes down to جزئية موجبة. Rules: E↔E; A→I; I→I; O has no valid converse. Converting A to A would overclaim (المحمول may be broader).'},

  {topic:'عكس النقيض',
   arabic:'عكس النقيض: جعل نقيض الأول ثانياً ونقيض الثاني أولاً',
   question:'According to the method of the classical scholars (المتقدمين), when الموجبة الكلية undergoes عكس النقيض, what is produced?',
   options:[
     {ar:'سالبة كلية',en:'Universal negative (E-proposition)'},
     {ar:'موجبة كلية بنقائض الطرفين',en:'Universal affirmative with negated terms (contrapositive)'},
     {ar:'موجبة جزئية',en:'Particular affirmative'},
     {ar:'لا عكس للنقيض للموجبة',en:'No contrapositive exists for the affirmative'}
   ],correct:1,
   sharh:'Classical method: swap terms AND negate both. "كل إنسان حيوان" → "كل لا حيوان لا إنسان." Modern method: negate the second term only, swap, and change quality → "لا شيء من اللاحيوان بإنسان."'},

  // ══════════════════════════════════════════════
  // 12. القياس الاقتراني
  // ══════════════════════════════════════════════
  {topic:'القياس — الأشكال الأربعة',
   arabic:'القياس الاقتراني: أشكال أربعة بحسب وضع الأوسط',
   question:'In الشكل الأول (first figure), how is the middle term (الأوسط) positioned?',
   options:[
     {ar:'موضوع في كلتا المقدمتين',en:'Subject in both premises'},
     {ar:'محمول في كلتا المقدمتين',en:'Predicate in both premises'},
     {ar:'موضوع في الصغرى ومحمول في الكبرى',en:'Subject in the minor premise and predicate in the major premise'},
     {ar:'محمول في الصغرى وموضوع في الكبرى',en:'Predicate in the minor premise and subject in the major premise'}
   ],correct:2,
   sharh:'الشكل الأول: الأوسط is SUBJECT in the minor (صغرى) and PREDICATE in the major (كبرى). E.g.: "العالم متغير | وكل متغير حادث → العالم حادث." This figure is أشرف الأشكال — its conclusion is most direct.'},

  {topic:'القياس — شروط الشكل الأول',
   arabic:'شرائط الشكل الأول: إيجاب الصغرى وكلية الكبرى',
   question:'What are the two شرائط (conditions) for valid inference in الشكل الأول?',
   options:[
     {ar:'كلية المقدمتين معاً',en:'Both premises must be universal'},
     {ar:'إيجاب الصغرى وكلية الكبرى',en:'Minor premise must be affirmative AND major premise must be universal'},
     {ar:'سلب إحدى المقدمتين',en:'One premise must be negative'},
     {ar:'كليتا المقدمتين موجبتان',en:'Both premises must be affirmative universals'}
   ],correct:1,
   sharh:'الشكل الأول: (1) إيجاب الصغرى — minor must be affirmative. (2) كلية الكبرى — major must be universal. If either fails, no valid conclusion follows. The conclusion follows the weaker premise in quality (كيف) and quantity (كم).'},

  {topic:'القياس — الشكل الثاني',
   arabic:'الشكل الثاني: الأوسط محمول في المقدمتين',
   question:'What is the required condition (in terms of quality) for the second figure?',
   options:[
     {ar:'كلتا المقدمتين موجبتان',en:'Both premises must be affirmative'},
     {ar:'اختلاف المقدمتين في الكيف (إيجاباً وسلباً) وكلية الكبرى',en:'Premises must DIFFER in quality (one affirmative, one negative) and major must be universal'},
     {ar:'كلتا المقدمتين سالبتان',en:'Both premises must be negative'},
     {ar:'إيجاب الصغرى فقط',en:'Only the minor premise needs to be affirmative'}
   ],correct:1,
   sharh:'الشكل الثاني: الأوسط is predicate in BOTH. Conditions: (1) اختلاف الكيف — one affirmative, one negative. (2) كلية الكبرى. Result is ALWAYS سالبة (negative). It has four valid moods (ضروب).'},

  {topic:'القياس — الشكل الثالث',
   arabic:'الشكل الثالث: الأوسط موضوع في المقدمتين',
   question:'What conditions govern the third figure?',
   options:[
     {ar:'كلية الصغرى وإيجاب الكبرى',en:'Minor must be universal AND major must be affirmative'},
     {ar:'إيجاب الصغرى وكلية الكبرى',en:'Minor must be affirmative AND major must be universal'},
     {ar:'إيجاب الصغرى وكليتها',en:'Minor must be affirmative AND minor must be universal'},
     {ar:'كلية المقدمتين معاً',en:'Both premises must be universal'}
   ],correct:2,
   sharh:'الشكل الثالث: الأوسط is subject in BOTH. Conditions: (1) إيجاب الصغرى and (2) كلية الصغرى (though some say إحدى المقدمتين كلية). The conclusion is ALWAYS جزئية (particular). It has six valid moods.'},

  {topic:'القياس الاستثنائي',
   arabic:'القياس الاستثنائي: مركب من شرطية واستثناء',
   question:'In a متصلة لزومية (necessary conditional), which inferential moves are VALID?',
   options:[
     {ar:'أي استثناء يُنتج نتيجة',en:'Any type of exception produces a conclusion'},
     {ar:'استثناء المقدم ينتج التالي؛ واستثناء نقيض التالي ينتج نقيض المقدم',en:'Affirming the antecedent yields the consequent; denying the consequent yields denial of antecedent'},
     {ar:'استثناء التالي ينتج المقدم',en:'Affirming the consequent yields the antecedent (INVALID)'},
     {ar:'استثناء نقيض المقدم ينتج نقيض التالي',en:'Denying the antecedent yields denial of consequent (INVALID)'}
   ],correct:1,
   sharh:'Valid moves in متصلة لزومية: (1) Affirm مقدم → affirm تالي (modus ponens). (2) Deny تالي → deny مقدم (modus tollens). INVALID: (3) deny مقدم (does NOT give deny تالي). (4) affirm تالي (does NOT give affirm مقدم). The تالي may be broader.'},

  {topic:'قياس الخلف',
   arabic:'قياس الخلف: إثبات المدعى بإبطال نقيضه',
   question:'What is the structure of قياس الخلف (reductio ad absurdum)?',
   options:[
     {ar:'قياس من مقدمات كلها كاذبة',en:'A syllogism with all false premises'},
     {ar:'إثبات المدعى بإظهار أن نقيضه يستلزم المحال',en:'Proving the claim by showing its negation leads to an impossibility'},
     {ar:'استقراء من أكثر الجزئيات',en:'Induction from most particulars'},
     {ar:'تمثيل بين فرع وأصل',en:'Analogy between a branch and a root case'}
   ],correct:1,
   sharh:'قياس الخلف: "المدعى ثابت لأنه لو لم يثبت لثبت نقيضه، وثبوت نقيضه يستلزم المحال." Two syllogisms combined: (1) conditional قياس showing negation → محال; (2) استثنائي syllogism concluding the claim. Used to prove عكس المستوي.'},

  // ══════════════════════════════════════════════

   arabic:'البرهان: قياس مؤلَّف من اليقينيات',

   options:[
     {ar:'الفطريات',en:'Fiṭriyyāt (innate propositions with implicit syllogism)'},
     {ar:'الأوليات (مثل: الكل أعظم من الجزء)',en:'Awwaliyyāt — e.g. "The whole is greater than the part"'},
     {ar:'التجريبيات',en:'Tajrībiyyāt (empirical)'},

  {topic:'البرهان — اللمي والإني',
   arabic:'البرهان اللمي: الأوسط علة للحكم في الواقع وفي الذهن',
   question:'What distinguishes برهان اللم from برهان الإن?',
   options:[
     {ar:'اللمي: من يقينيات. الإني: من ظنيات',en:'Limmī: from certain premises; Innī: from probable premises'},
     {ar:'اللمي: الأوسط علة ثبوت الأكبر في الواقع وفي الذهن. الإني: علة في الذهن فقط',en:'Limmī: middle term is the real external cause; Innī: middle term is a cognitive cause only (effect→cause reasoning)'},
     {ar:'اللمي: للعلوم الدينية. الإني: للعلوم الطبيعية',en:'Limmī: for religious sciences; Innī: for natural sciences'},

  {topic:'الجدل والخطابة',

   question:'What is the purpose of صناعة الجدل (dialectic) according to the Mirqaat?',
   options:[
     {ar:'إفادة اليقين القطعي',en:'Producing absolute certainty (يقين)'},
     {ar:'إلزام الخصم وحفظ الرأي من الإبطال',en:'Binding the opponent and defending one\'s position from refutation'},
     {ar:'التأثير في النفس وإثارة المشاعر',en:'Emotionally moving the soul and arousing feelings'},
     {ar:'إنتاج التخييل الشعري',en:'Producing poetic imagination'}
   ],correct:1,
   sharh:'الجدل: premises are مشهورات (widely accepted) or مسلَّمات (conceded by opponent). Goal: إلزام الخصم (bind the opponent with their own commitments) أو حفظ الرأي (defend your own position). It does NOT produce يقين — only إلزام.'},

  {topic:'الشعر والسفسطة',
   arabic:'القياس الشعري: من المخيَّلات المؤثِّرة في النفس',

   options:[
     {ar:'إثبات الحق بالحجة البرهانية',en:'Proving truth through demonstration'},
     {ar:'التأثير في النفس بالترهيب والترغيب؛ والكذب مستحسَن لأن المخيَّل أشد تأثيراً من الصادق',en:'Moving the soul through fear and desire; false imagery often works better than truth for this purpose'},
     {ar:'إلزام الخصم بما يُسلِّم به',en:'Compelling the opponent with what he concedes'},

     {ar:'الاستقراء والبرهان',en:'Induction and demonstration'},

  {topic:'المصادرة على المطلوب',
   arabic:'المصادرة على المطلوب: من المغالطات الصورية',
   question:'What is المصادرة على المطلوب (petitio principii)?',

   sharhEn:`(1) Those who hold that knowledge is the form occurring, while also holding that things themselves occur in the mind, said: "knowledge belongs to the category of quality" — but it was objected that on this view knowledge would be identical with the known, so it cannot be a quality at all, and one reality would fall under two categories (substance and quality). The master ʿAṭā Muḥammad al-Bandiyālwī explained: on this view, knowledge is of two types: the "form" and the "perceptual state" — the first does not belong to any fixed category but follows the category of the known; the second is the true knowledge and belongs to the category of quality. The objection arose from the mistaken assumption that "knowledge" here means the form in the category of quality.

   matnEn:`And it (knowledge) divides into two: one is called conception (taṣawwur), the other is expressed as assent (taṣdīq). Conception is perception free from judgment. By "judgment" is meant the relating of one thing to another, affirmatively or negatively — or if you prefer: affirmation or abstraction. Judgment may also be explained as the occurrence or non-occurrence of the relation, as when you conceive Zayd alone or "standing" alone without affirming standing for Zayd or negating it from him. Assent, according to the philosophers, is the judgment that accompanies (the three perceptions) — because conception is a condition for assent. The three conceptions are a condition for the existence of assent, hence there is no assent without conception. Imam al-Rāzī says: it is the sum of the judgment and the conceptions of the terms. So when you say "Zayd is standing" and you assent to Zayd's standing, you obtain three pieces of knowledge: one is knowledge of Zayd, the second is perception of the meaning of "standing," and the third is knowledge of the relational meaning expressed in Persian as "hast" for affirmation and "nīst" for negation.`,
